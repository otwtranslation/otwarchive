      access:
        contact_support: свържи се с АО3 Поддръжка
        html: В зависимост от архива твоите произведения може да са били добавени с ограничение за достъп само от регистрирани потребители (за да не се появяват като резултати при търсене в Гугъл). В този случай тези твои произведения ще бъдат достъпни само за потребителите, които са влезли в профила си, освен ако не решиш да ги направиш напълно достъпни. Ако се нуждаеш от помощ, за да отключиш, изоставиш или изтриеш произведение, моля, %{contact_support_link}.
        text: В зависимост от архива твоите произведения може да са били добавени с ограничение за достъп само от регистрирани потребители (за да не се появяват като резултати при търсене в Гугъл). В този случай тези твои произведения ще бъдат достъпни само за потребителите, които са влезли в профила си, освен ако не решиш да ги направиш напълно достъпни. Ако се нуждаеш от помощ, за да отключиш, изоставиш или изтриеш произведение, моля, свържи се с АО3 Поддръжка чрез %{support_url}.

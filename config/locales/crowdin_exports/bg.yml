      introduction:
        ao3_name: Archive of Our Own – AO3 (Нашият архив)
        html: Получаваш този имейл, защото има твои произведения във фенски архив, който е бил добавен от %{open_doors_name_link} към %{app_link}. Тъй като този имейл адрес е свързан с имейла, регистриран в импортирания архив, съответните фенски произведения (изредени по-долу) са автоматично добавени към твоя АО3 профил.
        open_doors_name: Open Doors (Отворени врати)
        text: 'Получаваш този имейл, защото има твои произведения във фенски архив, който е бил добавен от Open Doors (Отворени врати) (%{open_doors_url}) към Archive of Our Own – AO3 (Нашият архив): %{app_url}. Тъй като този имейл адрес е свързан с имейла, регистриран в импортирания архив, съответните фенски произведения (изредени по-долу) са автоматично добавени към твоя АО3 профил.'

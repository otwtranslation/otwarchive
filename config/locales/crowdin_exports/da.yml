    claim_notification:
      access:
        contact_support: kontakte AO3 Support
        html: Afhængig af arkivet kan dine værker være blevet importeret, så de er begrænset til registrerede brugere (for at de ikke vises i Google-søgninger). Hvis det er tilfældet, vil værkerne kun være tilgængelige for brugere, der er logget ind, medmindre du vælger at gøre dem fuldt synlige. For at få hjælp til at låse op for, frasige dig ophavsretten eller slette dine værker kan du %{contact_support_link}.
        text: Afhængig af arkivet kan dine værker være blevet importeret, så de er begrænset til registrerede brugere (for at de ikke vises i Google-søgninger). Hvis det er tilfældet, vil værkerne kun være tilgængelige for brugere, der er logget ind, medmindre du vælger at gøre dem fuldt synlige. For at få hjælp til at låse op for, frasige dig ophavsretten eller slette dine værker kan du kontakte AO3 Support på %{support_url}.
      email_tips: Hvis du kontakter os, så tilføj gerne e-mailadresser fra @transformativeworks.org til din liste med kontakter, du har tillid til, og tjek dit spamfilter for vores svar.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Vores Eget Arkiv)
        html: Du modtager denne e-mail, fordi du havde værker på et fanværk-arkiv, der er blevet importeret af %{open_doors_name_link} til %{app_link}. Fordi denne e-mailadresse er forbundet med en e-mail, der er registreret på det importerede arkiv, er de tilknyttede fanværker (listet nedenfor) automatisk blevet tilføjet til din AO3-konto.
        open_doors_name: Open Doors (Åbne Døre)
        text: 'Du har modtaget denne e-mail, fordi du havde værker på et fanværksarkiv, der er blevet importeret af Open Doors (Åbne Døre) (%{open_doors_url}) til Archive of Our Own – AO3 (Vores Eget Arkiv): %{app_url}. Fordi denne e-mailadresse er forbundet med en e-mail, der er registreret i det importerede arkiv, er de tilknyttede fanværker (listet nedenfor) automatisk blevet tilføjet til din AO3-konto.'

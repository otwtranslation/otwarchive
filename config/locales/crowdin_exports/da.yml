        contact_support: kontakte AO3 Support
        faq_page: FAQ-side
        html: Du kan læse annonceringer om nylige arkivflytninger på %{ao3_news_link} og finde yderligere information på Åbne Døres %{faq_page_link} eller %{tutorial_page_link}. Hvis du har yderligere spørgsmål, der ikke er besvaret i FAQ'en, tutorials eller denne e-mail, kan du %{contact_support_link}.
        text: Du kan læse annonceringer om nylige arkivflytninger på AO3 Nyheder (%{news_url}) og finde yderligere information på Åbne Døres FAQ-side (%{open_doors_faq_url}) eller tutorials-side (%{open_doors_tutorial_url}). Hvis du har yderligere spørgsmål, der ikke er besvaret i FAQ'en, tutorials eller denne e-mail, kan du kontakte Support på %{support_url}.
        tutorial_page: tutorial-side
      other_works:
        contact_open_doors: kontakt Åbne Døre
        html: Hvis du havde andre værker på det importerede arkiv, men under en e-mailadresse, du ikke længere kan tilgå, så %{contact_open_doors_link} med enhver information, der kan hjælpe med at bekræfte din identitet.
        text: Hvis du havde andre værker på det importerede arkiv, men under en e-mailadresse, du ikke længere kan tilgå, så kontakt gerne Åbne Døre med enhver information, der kan hjælpe med at bekræfte din identitet.

          html: Hvis du ikke ønsker, at dit værk forbliver anonymt, besøg din %{collection_items_link} for at fjerne det fra denne samling.
          text: 'Hvis du ikke ønsker, at dit værk forbliver anonymt, besøg din Approved Collection Items page (Din side for Godkendte Samlingselementer) for at fjerne det fra denne samling: %{collection_items_url}'
        anonymous_unrevealed:
          html: Hvis du ikke ønsker, at dit værk forbliver anonymt og ikke-offentliggjort, besøg din %{collection_items_link} for at fjerne det fra denne samling.
          text: 'Hvis du ikke ønsker, at dit værk forbliver anonymt og ikke-offentliggjort, besøg din Approved Collection Items page (Din side for Godkendte Samlingselementer) for at fjerne det fra denne samling: %{collection_items_url}'

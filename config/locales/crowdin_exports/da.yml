          html: Vedligeholderne af %{collection_link} har ændret status på dit værk %{work_link} til anonymt.
          text: Vedligeholderne af "%{collection_title}" (%{collection_url}) har ændret status på dit værk "%{work_title}" (%{work_url}) til anonymt.

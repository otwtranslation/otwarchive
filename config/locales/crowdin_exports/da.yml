        text: Afhængig af arkivet kan dine værker være blevet importeret, så de er begrænset til registrerede brugere (for at de ikke vises i Google-søgninger). Hvis det er tilfældet, vil værkerne kun være tilgængelige for brugere, der er logget ind, medmindre du vælger at gøre dem fuldt synlige. For at få hjælp til at låse op for, frasige dig ophavsretten eller slette dine værker kan du kontakte AO3 Support på %{support_url}.

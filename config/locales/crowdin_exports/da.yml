      contact_abuse: kontakte Retningslinjer & Misbrug
      html:
        help: Hvis du er i tvivl om, hvorfor dit værk er blevet skjult, og du ikke har modtaget nogen beskeder vedrørende dette emne, kan du %{contact_abuse_link} direkte.
        hidden: Dit værk %{title} er blevet skjult af Retningslinjer & Misbrug-teamet og er ikke længere offentligt tilgængeligt.
        tos_violation: Hvis dit værk er blevet skjult, fordi det var i strid med AO3's %{tos_link}, er du nødt til først at rette op på forsømmelsen. Hvis du ikke formår at tilpasse dit værk, så det overholder Brugsbetingelserne, kan det i sidste ende resultere i, at dit værk bliver slettet fra AO3.
      subject: "[%{app_name}] Dit værk er blevet skjult af Retningslinjer & Misbrug-teamet"
      text:
        help: 'Hvis du er i tvivl om, hvorfor dit værk er blevet skjult, og du ikke har modtaget nogen beskeder vedrørende dette emne, kan du kontakte Retningslinjer & Misbrug direkte: %{contact_abuse_url}'
        hidden: Dit værk "%{title}" (%{work_url}) er blevet skjult af Retningslinjer & Misbrug-teamet og er ikke længere offentligt tilgængeligt.
        tos_violation: Hvis dit værk blev skjult, fordi det var i strid med AO3's Brugsbetingelser (%{tos_url}), er du nødt til først at rette op på forsømmelsen. Hvis du ikke formår at tilpasse dit værk, så det overholder Brugsbetingelserne, kan det i sidste ende resultere i, at dit værk bliver slettet fra AO3.
      tos: Brugsbetingelser
    anonymous_or_unrevealed_notification:
      anonymous_info: Anonyme værker er inkluderet i tag-lister, men ikke på din side for værker. På værket vil dit brugernavn blive erstattet med "Anonymous" (Anonym).
      anonymous_unrevealed_info: Vedligeholderne vil måske senere afsløre dit værk, men holde det anonymt. Folk, som abonnerer på dig, vil ikke få en notifikation om denne ændring. Når det er afsløret, vil dit værk blive inkluderet i tag-lister, men ikke på din side for værker. På værket vil dit brugernavn blive erstattet med "Anonymous" (Anonym).

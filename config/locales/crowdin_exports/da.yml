        html: Har du andre forespørgsler, så %{contact_support_link}.
        text: Har du andre forespørgsler, så kontakt AO3 Support på %{support_url}.
      redirects:
        html: Af hensyn til lister med anbefalinger eller bogmærker kan det importerede arkivs hjemmeside i en begrænset periode omdirigere til de importerede kopier af disse værker (tjek annonceringen om dit arkiv for at være sikker). Hvis du allerede har uploadet en kopi af disse værker, og du %{negation} importerede ved at bruge URL-funktionen, vil der være to kopier af det samme værk på AO3.
      subject: "[%{app_name}] Værker er blevet uploadet"
      update_redirect:
        contact_open_doors: kontakte Åbne Døre
        html: Hvis du ønsker, at Åbne Døre opdaterer omdirigeringen, så den leder til dit allerede eksisterende værk, så skal du slette den importerede kopi og %{contact_open_doors_link} med dit brugernavn på AO3, dit brugernavn på det importerede arkiv samt titel og URL på det fanværk, der skal omdirigeres til. (Hvis du har flere værker, du gerne vil ændre omdirigeringen for, kan du liste dem alle i én e-mail).
        text: Hvis du ønsker, at Åbne Døre opdaterer omdirigeringen, så den leder til dit allerede eksisterende værk, så skal du slette den importerede kopi og kontakte Åbne Døre på %{open_doors_url} med dit brugernavn på AO3, dit brugernavn på det importerede arkiv samt titel og URL på det fanværk, der skal omdirigeres til. (Hvis du har flere værker, du gerne vil ændre omdirigeringen for, kan du liste dem alle i én e-mail).

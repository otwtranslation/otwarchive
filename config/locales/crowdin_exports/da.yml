        contact_open_doors: Kontakt Åbne Døre
        html: Hvis dette er en fejl, og disse værker ikke er dine, skal du ikke slette dem! %{contact_open_doors_link}, så ordner vi det.
        text: Hvis dette er en fejl, og disse værker ikke er dine, skal du ikke slette dem! Kontakt Åbne Døre (%{open_doors_url}), så ordner vi det.

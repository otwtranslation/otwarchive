        text: 'Du har modtaget denne e-mail, fordi du havde værker på et fanværksarkiv, der er blevet importeret af Open Doors (Åbne Døre) (%{open_doors_url}) til Archive of Our Own – AO3 (Vores Eget Arkiv): %{app_url}. Fordi denne e-mailadresse er forbundet med en e-mail, der er registreret i det importerede arkiv, er de tilknyttede fanværker (listet nedenfor) automatisk blevet tilføjet til din AO3-konto.'

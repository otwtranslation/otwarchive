        text: Se você gostaria que o Open Doors atualizasse o redirecionamento para a sua obra pré-existente, por favor, delete a cópia importada e entre em contato com o Open Doors no link %{open_doors_url} com o nome da sua conta no AO3, o nome da sua conta no arquivo importado, o título e a URL da obra de fã que você gostaria que fosse redirecionada. (Se você tiver múltiplas obras das quais gostaria de mudar o redirecionamento, pode listá-las em um único e-mail.)

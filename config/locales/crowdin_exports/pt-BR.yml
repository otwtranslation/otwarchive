          html: Se você não deseja que sua obra continue anônima, por favor acesse sua %{collection_items_link} para removê-la dessa coleção.
          text: 'Se você não deseja que sua obra continue anônima, por favor acesse sua página de Approved Collection Items (Itens aprovados para coleção) para removê-la dessa coleção: %{collection_items_url}'
        anonymous_unrevealed:
          html: Se você não deseja que a sua obra continue anônima e não revelada, por favor acesse sua %{collection_items_link} para removê-la dessa coleção.
          text: 'Se você não deseja que a sua obra continue anônima e não revelada, por favor acesse sua página de Approved Collection Items (Itens aprovados para coleção) para removê-la dessa coleção: %{collection_items_url}'
        unrevealed:
          html: Se você não deseja que a sua obra continue com o status de não revelada, por favor acesse sua %{collection_items_link} para removê-la dessa coleção.
          text: 'Se você não deseja que a sua obra continue com o status de não revelada, por favor acesse sua página de Approved Collection Items (Itens aprovados para coleção) para removê-la dessa coleção: %{collection_items_url}'
      faq_link_text: seção de FAQ sobre Coleções

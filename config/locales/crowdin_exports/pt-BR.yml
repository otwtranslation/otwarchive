        anonymous_unrevealed: "[%{app_name}] Sua obra foi marcada como anônima e não revelada"
        unrevealed: "[%{app_name}] Sua obra foi marcada como não revelada"
      unrevealed_info: Obras não reveladas não aparecem no site em geral ou na sua página pessoal. Qualquer pessoa que acessar um link para essa obra receberá um aviso dizendo que ela se encontra não revelada no momento e que não é possível acessar seu conteúdo.

      do_not_want:
        anonymous:
          html: Se você não deseja que sua obra continue anônima, por favor acesse sua %{collection_items_link} para removê-la dessa coleção.
          text: 'Se você não deseja que sua obra continue anônima, por favor acesse sua página de Approved Collection Items (Itens aprovados para coleção) para removê-la dessa coleção: %{collection_items_url}'
        anonymous_unrevealed:
          html: Se você não deseja que a sua obra continue anônima e não revelada, por favor acesse sua %{collection_items_link} para removê-la dessa coleção.
          text: 'Se você não deseja que a sua obra continue anônima e não revelada, por favor acesse sua página de Approved Collection Items (Itens aprovados para coleção) para removê-la dessa coleção: %{collection_items_url}'
        unrevealed:
          html: Se você não deseja que a sua obra continue com o status de não revelada, por favor acesse sua %{collection_items_link} para removê-la dessa coleção.
          text: 'Se você não deseja que a sua obra continue com o status de não revelada, por favor acesse sua página de Approved Collection Items (Itens aprovados para coleção) para removê-la dessa coleção: %{collection_items_url}'
      faq_link_text: seção de FAQ sobre Coleções
      more_info:
        html: Para mais informações, acesse a nossa %{faq_link}.
        text: 'Para mais informações, acesse a nossa seção de FAQ sobre Coleções: %{faq_url}'
      subject:
        anonymous: "[%{app_name}] Sua obra foi marcada como anônima"
        anonymous_unrevealed: "[%{app_name}] Sua obra foi marcada como anônima e não revelada"
        unrevealed: "[%{app_name}] Sua obra foi marcada como não revelada"
      unrevealed_info: Obras não reveladas não aparecem no site em geral ou na sua página pessoal. Qualquer pessoa que acessar um link para essa obra receberá um aviso dizendo que ela se encontra não revelada no momento e que não é possível acessar seu conteúdo.
    archivist_added_to_collection_notification:
      approved_collection_items_page: página Approved Collection Items (Itens Aprovados em Coleções)
      archivist_notice: Como quem mantém a coleção atua em sua capacidade oficial como arquivista do Open Doors (Portas Abertas), essas pessoas têm permissão para adicionar sua obra a essa coleção, mesmo que você tenha desativado os convites para coleção. Arquivistas só adicionarão uma obra a uma coleção se ela tiver sido hospedada em um arquivo importado.
      removal_instructions:
        html: Caso queira remover sua obra dessa coleção, por favor, visite sua %{approved_items_link}.
        text: 'Caso queira remover sua obra dessa coleção, por favor, visite sua página de Approved Collection Items (Itens Aprovados em Coleções): %{approved_items_url}.'
      subject: "[%{app_name}][%{collection_title}] Sua obra foi incluída em uma coleção do Open Doors (Portas Abertas)."
      work_added:
        html: A curadoria da coleção %{collection_link} incluiu sua obra %{work_link} nessa coleção!
        text: A curadoria da coleção "%{collection_title}" (%{collection_url}) incluiu sua obra "%{work_title}" (%{work_url}) nessa coleção!
    challenge_assignment_notification:
      any: Quaisquer
      assignment:
        html: Você recebeu a seguinte tarefa no desafio %{link} no AO3!
      recipient_missing: 'Ninguém: entre em contato com a moderação do desafio para receber ajuda!'
      subject: "[%{app_name}][%{collection_title}] Sua tarefa!"
    claim_notification:
      access:
        contact_support: entre em contato com o Suporte do AO3
      email_tips: Se você entrar em contato conosco, por favor, adicione os endereços de e-mail de @transformativeworks.org à sua lista de contatos e verifique as suas pastas de spam para encontrar nossas respostas.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Um Arquivo Todo Nosso)
        open_doors_name: Open Doors (Portas Abertas)
      mistake:
        contact_open_doors: entre em contato com o Open Doors
        html: Se isto é um erro e estas obras não são suas, por favor, não as delete! Simplesmente %{contact_open_doors_link} e nós resolveremos.
        text: Se isto é um erro e estas obras não são suas, por favor, não as delete! Simplesmente entre em contato com o Open Doors (%{open_doors_url}) e nós resolveremos.
      more_info:
        ao3_news: Notícias do AO3
        contact_support: entre em contato com o Suporte do AO3
        faq_page: página de FAQ
        tutorial_page: tutorial
      other_works:
        contact_open_doors: entre em contato com o Open Doors
      questions:
        contact_support: entre em contato com o Suporte do AO3
        html: Em caso de outras dúvidas, por favor, %{contact_support_link}.
        text: Em caso de outras dúvidas, por favor, entre em contato com o Suporte do AO3 no link %{support_url}.
      subject: "[%{app_name}] Upload de obras"
      work_info:
        html: "%{work_link} (%{fandom})"
    creatorship_notification:
      explanation: Agora que o seu pseudônimo foi adicionado à obra, ele também poderá aparecer em novos capítulos dessa mesma obra, independentemente das suas preferências no site. Seu pseudônimo também aparecerá em qualquer série à qual a obra for adicionada.
      html:
        creation: "%{creation_link} por %{pseud_links}"
        edit_chapter: editar o capítulo
        edit_series: editar a série
        remove_chapter: Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa obra como coartista, é só %{edit_chapter_link} para remover seu nome.
        remove_series: Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa série como coartista, é só %{edit_series_link} para remover seu nome.
      intro_chapter: 'Seu pseudônimo %{pseud} foi adicionado por %{adding_user} como coartista do seguinte capítulo:'
      intro_series: 'Seu pseudônimo %{pseud} foi adicionado por %{adding_user} como coartista da seguinte série:'

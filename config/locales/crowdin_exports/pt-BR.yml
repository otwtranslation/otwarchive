        app_short_name: AO3
        open_doors: Equipe do Open Doors (Portas Abertas)
        parent_org: Organization for Transformative Works – OTW (Organização para Obras Transformativas)
        support: Equipe de Suporte do AO3
  user_mailer:
    anonymous_or_unrevealed_notification:
      changed_status:
        anonymous:
          html: A equipe de administração da coleção %{collection_link} mudou o status da sua obra %{work_link} para anônima.
          text: A equipe de administração da coleção "%{collection_title}" (%{collection_url}) mudou o status da sua obra "%{work_title}" (%{work_url}) para anônima.
        anonymous_unrevealed:
          html: A administração da coleção %{collection_link} mudou o status da sua obra %{work_link} para anônima e não revelada.
          text: A equipe de administração da coleção "%{collection_title}" (%{collection_url}) mudou o status da sua obra "%{work_title}" (%{work_url}) para anônima e não revelada.
        unrevealed:
          html: A equipe de administração da coleção %{collection_link} mudou o status da sua obra %{work_link} para não revelada.
          text: A equipe de administração da coleção "%{collection_title}" (%{collection_url}) mudou o status da sua obra "%{work_title}" (%{work_url}) para não revelada.

      mistake:
        contact_open_doors: entre em contato com o Open Doors
        html: Se isto é um erro e estas obras não são suas, por favor, não as delete! Simplesmente %{contact_open_doors_link} e nós resolveremos.
        text: Se isto é um erro e estas obras não são suas, por favor, não as delete! Simplesmente entre em contato com o Open Doors (%{open_doors_url}) e nós resolveremos.

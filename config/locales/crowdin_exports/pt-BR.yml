        text: Dependendo do arquivo, talvez as suas obras tenham sido importadas com acesso apenas para pessoas com contas registradas (para mantê-las fora das pesquisas do Google). Se for o caso, essas obras serão acessíveis apenas a quem fez login, ao menos que você decida torná-las visíveis a visitantes. Se precisar de ajuda para desbloquear, orfanar, ou deletar suas obras, por favor, entre em contato com o Suporte do AO3 no link %{support_url}.

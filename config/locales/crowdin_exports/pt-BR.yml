      anonymous_unrevealed_info: A administração da coleção poderá, posteriormente, revelar a sua obra, mas mantê-la anônima. Nesse caso, pessoas que recebem atualizações sobre suas obras não serão notificadas. Uma vez revelada, sua obra aparecerá em todo o site, exceto na sua página pessoal. Enquanto a obra permanecer anônima, ela será atribuída a "Anonymous".

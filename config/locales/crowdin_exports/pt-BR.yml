        creation: "%{title} (%{url}) por %{pseuds}"
        remove_chapter: 'Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa obra como coartista, é só editar o capítulo para remover seu nome: %{url}'
        remove_series: 'Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa série como coartista, é só editar a série para remover seu nome: %{url}'
    creatorship_notification_archivist:
      explanation: Essa conta arquivista, por ser participante oficial do projeto Open Doors (Portas Abertas), pode adicionar seu nome a uma obra sem solicitação prévia, mesmo que você não tenha habilitado cocriação na sua conta.
      html:
        creation: "%{creation_link} por %{pseud_links}"
        edit_chapter: edite o capítulo
        edit_series: edite a série
        edit_work: edite a obra
        remove_chapter: Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa obra como coartista, %{edit_chapter_link} para remover seu nome.
        remove_series: Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa obra como coartista, %{edit_series_link} para remover seu nome.
        remove_work: Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa obra como coartista, %{edit_work_link} para remover seu nome.
      intro_chapter: 'Seu pseudônimo %{pseud} foi adicionado como coartista do capítulo abaixo por %{archivist}:'
      intro_series: 'Seu pseudônimo %{pseud} foi adicionado como coartista da série abaixo por %{archivist}:'
      intro_work: 'Seu pseudônimo %{pseud} foi adicionado como coartista da obra abaixo por %{archivist}:'
      text:
        creation: "%{title} (%{url}) por %{pseuds}"
        remove_chapter: 'Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa obra como coartista, você pode editar o capítulo para remover seu nome: %{url}'
        remove_series: 'Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa obra como coartista, você pode editar a série para remover seu nome: %{url}'
        remove_work: 'Caso isso tenha ocorrido por engano ou você não queira que seu pseudônimo apareça nessa obra como coartista, edite a obra para remover seu nome: %{url}'
    creatorship_request:
      html:
        creation: "%{creation_link} por %{pseud_links}"
        instructions: Para aceitar ou recusar esse convite, acesse sua página de %{page_name}.
        page_name: Co-Creator Requests (Convites para ser coartista)
      intro_chapter: 'A conta %{inviting_user} convidou seu pseudônimo %{pseud} para aparecer como coartista do seguinte capítulo:'
      intro_series: 'A conta %{inviting_user} convidou seu pseudônimo %{pseud} para aparecer como coartista da seguinte série:'
      intro_work: 'A conta %{inviting_user} convidou seu pseudônimo %{pseud} para aparecer como coartista da seguinte obra:'

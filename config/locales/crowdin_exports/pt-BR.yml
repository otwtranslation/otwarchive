        text: Sua obra "%{title}" foi apagada do AO3 por um membro da equipe de administração do site.
      html:
        tos_violation: Caso seja possível que sua obra tenha violado os Termos de Serviço do AO3, por favor %{contact_abuse_link}.
      import_project:
        html: Se sua obra era parte de um projeto de importação ligado ao Open Doors (Portas Abertas), por favor %{opendoors_link} com qualquer dúvida.
        text: Se sua obra era parte de um projeto de importação ligado ao Open Doors (Portas Abertas), por favor entre em contato com a equipe do Portas Abertas (%{opendoors_link}) com qualquer dúvida.
      opendoors: entre em contato com a equipe do Portas Abertas
      subject: "[%{app_name}] Sua obra foi removida pela administração do AO3"
      text:
        tos_violation: Caso seja possível que sua obra tenha violado os Termos de Serviço do AO3, por favor entre em contato com a nossa equipe de Diretrizes e Abuso (%{contact_abuse_url}).
    admin_hidden_work_notification:
      access: Enquanto sua obra estiver oculta, você poderá acessá-la através do link fornecido acima, mas ela não aparecerá na sua página de obras e não estará disponível para quem visitar o AO3.
      check_email: Por favor, cheque seu e-mail, inclusive sua pasta de spam, pois a equipe de Diretrizes e Abuso já pode ter entrado em contato para explicar a razão dessa medida.
      contact_abuse: entre em contato com a equipe de Diretrizes e Abuso
      html:
        help: Se não tiver certeza do motivo dessa decisão e não tiver recebido outros comunicados em relação a este assunto, por favor %{contact_abuse_link} diretamente.
        hidden: A equipe de Diretrizes e Abuso ocultou sua obra %{title} e ela não está mais publicamente acessível.
        tos_violation: Caso isso tenha ocorrido por sua obra violar os %{tos_link} do AO3, é necessário que você corrija a infração. A não adequação da sua obra aos Termos de Serviço pode fazer com que ela seja removida do AO3.
      subject: "[%{app_name}] A equipe de Diretrizes e Abuso ocultou sua obra"
      text:
        help: 'Se não tiver certeza do motivo dessa decisão e não tiver recebido outros comunicados em relação a este assunto, por favor entre em contato diretamente com a equipe de Diretrizes e Abuso: %{contact_abuse_url}.'
        hidden: A equipe de Diretrizes e Abuso ocultou sua obra "%{title}" (%{work_url}) e ela não está mais publicamente acessível.
        tos_violation: Caso isso tenha ocorrido por sua obra violar os Termos de Serviço (%{tos_url}) do AO3, é necessário que você corrija a infração. A não adequação da sua obra aos Termos de Serviço pode fazer com que ela seja removida do AO3.
      tos: Termos de Serviço
    anonymous_or_unrevealed_notification:

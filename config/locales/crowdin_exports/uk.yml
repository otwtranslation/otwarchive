        text: 'Якщо Ви хочете, щоб Відкриті Двері оновили перенаправлення на Вашу вже наявну роботу, будь ласка, видаліть імпортовану копію та зверніться до Відкритих Дверей за посиланням: %{open_doors_url}, вказавши ім''я Вашого облікового запису на АО3, ім''я Вашого облікового запису в імпортованому архіві, а також назву та URL- адресу фанроботи, на яку Ви б хотіли зробити перенаправлення.'

        html: Якщо у Вас є інші роботи в імпортованому архіві, але у Вас немає доступу до електронної адреси, під якою вони були написані, будь ласка, %{contact_open_doors_link} та надайте будь-яку інформацію, яка могла б допомогти верифікувати Вас.
        text: Якщо у Вас є інші роботи в імпортованому архіві, але у Вас немає доступу до електронної адреси, під якою вони були написані, будь ласка, зв'яжіться з Відкритими Дверима та надайте будь-яку інформацію, яка могла б допомогти верифікувати Вас.

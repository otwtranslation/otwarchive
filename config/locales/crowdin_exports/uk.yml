        html: Залежно від архіву, Ваші роботи могли бути імпортовані з доступом лише для зареєстрованих користувачів (аби їх не було видно в пошуку Google). У такому випадку, тільки залогінені користувачі матимуть можливість переглядати Ваші роботи, якщо Ви самі не вирішите відкрити до них доступ повністю. Щоб отримати допомогу з налаштуванням доступу до робіт, видаленням або відмовою від них, будь ласка, %{contact_support_link}.
        text: 'Залежно від архіву, Ваші роботи могли бути імпортовані з доступом лише для зареєстрованих користувачів (аби їх не було видно в пошуку Google). В такому випадку, тільки залогінені користувачі матимуть можливість переглядати Ваші роботи, якщо Ви самі не вирішили відкрити до них доступ повністю. Щоб отримати допомогу з відкриттям робіт, видаленням або відмовою від них, будь ласка, зверніться до Служби Підтримки за посиланням: %{support_url}.'
      email_tips: Якщо Ви вирішили написати нам, будь ласка, додайте @transformativeworks.org до Вашого списку надійних контактів і перевіряйте папку зі спамом на наявність нашої відповіді.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Нашого Власного Архіву)
        html: Ви отримали цей електронний лист, тому що Ваші роботи перебували в архіві фанробіт, який %{open_doors_name_link} імпортували до %{app_link}. Оскільки ця електронна адреса збігається з адресою, зареєстрованою в імпортованому архіві, пов'язані фанроботи (перелічені нижче) було автоматично додано до Вашого облікового запису на АО3.
        open_doors_name: Open Doors (Відкриті Двері)
        text: 'Ви отримали цей електронний лист, тому що Ваші роботи перебували в архіві фанробіт, який Open Doors (Відкриті Двері) (%{open_doors_url}) імпортували до Archive of Our Own – AO3 (Нашого Власного Архіву): %{app_url}. Оскільки ця електронна адреса збігається з адресою, зареєстрованою в імпортованому архіві, пов''язані фанроботи (перелічені нижче) було автоматично додано до Вашого облікового запису на АО3.'
      mistake:
        contact_open_doors: зв'яжіться з Відкритими Дверима
        html: Якщо виникла помилка, і ці роботи Вам не належать, будь ласка, не видаляйте їх! Просто %{contact_open_doors_link}, і ми вирішимо цю проблему.
        text: Якщо виникла помилка, і ці роботи Вам не належать, будь ласка, не видаляйте їх! Просто зв'яжіться з Відкритими Дверима (%{open_doors_url}), і ми вирішимо цю проблему.
      more_info:
        ao3_news: Новин АО3
        contact_support: зверніться до Служби Підтримки АО3.
        faq_page: сторінці FAQ
        html: Ви можете прочитати оголошення про нещодавні переміщення архіву на сторінці %{ao3_news_link}, а також ознайомитися з додатковою інформацією на %{faq_page_link} Відкритих Дверей або на %{tutorial_page_link}. Якщо Ви не знайдете відповіді на своє питання у наших посібниках, FAQ або у цьому листі, будь ласка, %{contact_support_link}.
        text: 'Ви можете прочитати оголошення про нещодавні переміщення архіву на сторінці Новин АО3 (%{news_url}), а також ознайомитися з додатковою інформацією на сторінці FAQ Відкритих Дверей (%{open_doors_faq_url}) або на сторінці з посібниками (%{open_doors_tutorial_url}). Якщо Ви не знайдете відповіді на своє запитання у наших посібниках, FAQ або в цьому листі, будь ласка, зверніться до Служби Підтримки за посиланням: %{support_url}.'
        tutorial_page: сторінці з посібниками

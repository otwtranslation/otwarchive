        open_doors_name: Open Doors (Відкриті Двері)
        text: 'Ви отримали цей електронний лист, тому що Ваші роботи перебували в архіві фанробіт, який Open Doors (Відкриті Двері) (%{open_doors_url}) імпортували до Archive of Our Own – AO3 (Нашого Власного Архіву): %{app_url}. Оскільки ця електронна адреса збігається з адресою, зареєстрованою в імпортованому архіві, пов''язані фанроботи (перелічені нижче) було автоматично додано до Вашого облікового запису на АО3.'

    claim_notification:
      access:
        contact_support: liên lạc Ban Hỗ Trợ của AO3
        html: Tùy thuộc vào kho tàng gốc, sau khi được nhập vào, các tác phẩm của bạn có thể chỉ hiển thị với người dùng đã đăng ký (để tránh những tác phẩm ấy hiển thị khi dùng chức năng tìm kiếm của Google). Trong trường hợp đó, chỉ những người dùng đã đăng nhập mới có thể nhìn thấy tác phẩm, trừ khi bạn cho phép hiển thị với mọi người. Để mở khóa, bỏ quyền sở hữu hoặc xóa tác phẩm, hãy %{contact_support_link}.
        text: Tùy thuộc vào kho tàng gốc, sau khi được nhập vào, các tác phẩm của bạn có thể chỉ hiển thị với người dùng đã đăng ký (để tránh những tác phẩm ấy hiển thị khi dùng chức năng tìm kiếm của Google). Trong trường hợp đó, chỉ những người dùng đã đăng nhập mới có thể nhìn thấy tác phẩm, trừ khi bạn cho phép hiển thị với mọi người. Để mở khóa, bỏ quyền sở hữu hoặc xóa tác phẩm, hãy liên lạc với Ban Hỗ Trợ AO3 ở %{support_url}.
      email_tips: Để đảm bảo liên lạc giữa hai bên, hãy thêm @transformativeworks.org vào danh sách email an toàn của bạn và kiểm tra hòm thư spam nếu không tìm thấy phản hồi của chúng tôi.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Kho Tàng Lưu Trữ của Chúng Ta)
        html: Bạn nhận được thư này vì bạn có tác phẩm đăng tải ở trang kho tàng lưu trữ tác phẩm fan được %{open_doors_name_link} nhập vào %{app_link}. Vì địa chỉ e-mail này liên kết trực tiếp với địa chỉ e-mail đăng ký trong dữ liệu trang kho tàng được nhập, các tác phẩm tương ứng (được liệt kê sau đây) đã được tự động thêm vào tài khoản AO3 của bạn.
        open_doors_name: Open Doors (Dự án Cửa Mở)
        text: 'Bạn nhận được email này vì những tác phẩm của bạn trong kho tàng lưu trữ tác phẩm của fan đã được nhập bởi Open Doors (Cửa Mở) (%{open_doors_url} đến Archive of Our Own – AO3 (Kho tàng lưu trữ của chúng ta): %{app_url}.. Vì địa chỉ email này được liên kết với email đăng ký ở kho tàng đó, nên những tác phẩm liên quan (được liệt kê bên dưới) được tự động thêm vào tài khoản AO3 của bạn.'

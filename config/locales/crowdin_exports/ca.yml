    admin_hidden_work_notification:
      access: Mentre la teva obra estigui oculta, podràs seguir accedint-hi mitjançant l'enllaç proporcionat a dalt, però ja no estarà llistada a la teva pàgina d'obres i ja no estarà disponible per als altres usuaris/àries de l'AO3.
      check_email: Revisa el teu correu electrònic, inclosa la teva carpeta de correu brossa, ja que és possible que l'equip de Polítiques i Prevenció de l'Abús d'AO3 ja s'hagi posat en contacte amb tu per explicar-te per què s'ha ocultat la teva obra.
      contact_abuse: contacta amb Polítiques i Prevenció de l'Abús d'AO3
      html:
        help: Si no tens clar per què ha estat ocultada la teva obra i no has rebut cap comunicació al respecte, %{contact_abuse_link} directament.
        hidden: La teva obra %{title} ha estat ocultada per l'equip de Polítiques i Prevenció de l'Abús d'AO3 i ja no és d'accés públic.
        tos_violation: Si la teva obra ha estat ocultada degut a una violació dels %{tos_link} de l'AO3, hauràs d'emprendre les mesures exigides per corregir la infracció. L'incompliment dels Termes i condicions de servei pot comportar que la teva obra sigui eliminada de l'AO3.
      subject: "[%{app_name}] La teva obra ha estat ocultada per l'equip de Polítiques i Prevenció de l'Abús d'AO3"
      text:
        help: 'Si no tens clar per què ha estat ocultada la teva obra i no has rebut cap comunicació al respecte, contacta amb Polítiques i Prevenció de l''Abús d''AO3 directament: %{contact_abuse_url}'
        hidden: La teva obra "%{title}" (%{work_url}) ha estat ocultada per l'equip de Polítiques i Prevenció de l'Abús d'AO3 i ja no és d'accés públic.
        tos_violation: Si la teva obra ha estat ocultada degut a una violació dels Termes i condicions de servei (%{tos_url}) de l'AO3, hauràs d'emprendre les mesures exigides per corregir la infracció. L'incompliment dels Termes i condicions de servei pot comportar que la teva obra sigui eliminada de l'AO3.
      tos: Termes i condicions de servei
    anonymous_or_unrevealed_notification:
      anonymous_info: Les obres anònimes s'inclouen a les llistes d'etiquetes però no a la pàgina de les teves obres. Dins l'obra, el teu nom d'usuària o usuari quedarà substituït per "Anonymous" (Anònim/a).
      anonymous_unrevealed_info: Més endavant, els encarregats de la col·lecció poden tornar a mostrar la teva obra però deixar-la com a anònima. La gent que tens subscrita no serà notificada d'aquest canvi. Una vegada revelada, la teva obra quedarà inclosa a les llistes d'etiquetes però no a la teva pàgina d'obres. Dins l'obra, el teu nom d'usuària o usuari quedarà substituït per "Anonymous" (Anònim/a).

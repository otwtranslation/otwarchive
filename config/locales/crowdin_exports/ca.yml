        anonymous:
          html: Les persones encarregades de la col·lecció %{collection_link} han canviat la condició de la teva obra %{work_link} a anònima.
          text: Les persones encarregades de la col·lecció "%{collection_title}" (%{collection_url}) han canviat l'estat de la teva obra "%{work_title}" (%{work_url}) a anònima.
        anonymous_unrevealed:
          html: Les persones encarregades de la col·lecció %{collection_link} han canviat l'estat de la teva obra %{work_link} a anònima i oculta.
          text: Les persones encarregades de la col·lecció "%{collection_title}" (%{collection_url}) han canviat l'estat de la teva obra "%{work_title}" (%{work_url}) a anònima i oculta.
        unrevealed:
          html: Les persones encarregades de la col·lecció %{collection_link} han canviat l'estat de la teva obra %{work_link} a oculta.
          text: Les persones encarregades de la col·lecció "%{collection_title}" (%{collection_url}) han canviat l'estat de la teva obra "%{work_title}" (%{work_url}) a oculta.

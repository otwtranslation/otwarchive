      approved_collection_items_page: pàgina d'Approved Collection Items (Elements de col·lecció aprovats)
      archivist_notice: Com que les persones responsables de la col·lecció actuen oficialment com a arxivistes d'Open Doors (Projecte de Portes Obertes), poden afegir la teva obra a aquesta col·lecció encara que tinguis les invitacions a col·leccions desactivades. Els i les arxivistes només afegeixen a col·leccions obres que s'allotjaven a un arxiu importat.
      removal_instructions:
        html: Si vols retirar la teva obra d'aquesta col·lecció, ves a la teva %{approved_items_link}.

        anonymous_unrevealed: "[%{app_name}] La teva obra s'ha canviat a anònima i oculta"
        unrevealed: "[%{app_name}] La teva obra s'ha canviat a oculta"
      unrevealed_info: Les obres ocultes no apareixen a les llistes d'etiquetes ni a la teva pàgina d'obres. Qualsevol persona que obri un enllaç a l'obra rebrà una notificació informant que de moment és oculta i no podran accedir al seu contingut.

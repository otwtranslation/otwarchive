          text: 'Si no vols que la teva obra sigui anònima ni oculta, visita la pàgina d''Approved Collection Items (Elements aprovats de la col·lecció) per eliminar-la d''aquesta col·lecció: %{collection_items_url}'
        unrevealed:
          html: Si no vols que la teva obra sigui oculta, visita la %{collection_items_link} per eliminar-la d'aquesta col·lecció.
          text: 'Si no vols que la teva obra sigui oculta, visita la pàgina d''Approved Collection Items (Elements aprovats de la col·lecció) per eliminar-la d''aquesta col·lecció: %{collection_items_url}'

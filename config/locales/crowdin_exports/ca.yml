    claim_notification:
      access:
        contact_support: contacta amb el Suport de l'AO3
        html: Depenent de l'arxiu, les teues obres poden haver estat importades de manera restringida, amb la qual cosa tan sols els usuaris i les usuàries registrades podran veure-les (per tal que no apareguen a les cerques de Google). Si aquest és el cas, les obres només seran accessibles per als usuaris i usuàries que han iniciat la sessió llevat que les faces visibles per a tothom. Si necessites ajuda desbloquejant, deixant òrfena o esborrant alguna de les teues obres, %{contact_support_link}.
        text: Depenent de l'arxiu, les teues obres poden haver estat importades de manera restringida, amb la qual cosa tan sols els usuaris i les usuàries registrades podran veure-les (per tal que no apareguen a les cerques de Google). Si aquest és el cas, les obres només seran accessibles per als usuaris i usuàries que han iniciat la sessió llevat que les faces visibles per a tothom. Si necessites ajuda desbloquejant, deixant òrfena o esborrant alguna de les teues obres, contacta amb el Suport de l'AO3 a %{support_url}.
      email_tips: Si ens contactes, recomanem que afiges les adreces de correu electrònic de @transformativeworks.org a la teua llista de contactes segurs i que revises la safata de correu brossa.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Un Arxiu Propi)
        html: Has rebut aquest missatge de correu perquè tens obres en un arxiu d'obres de fans que ha estat importat per %{open_doors_name_link} a l'%{app_link}. Com que aquesta adreça de correu està connectada a una registrada a l'arxiu importat, les obres associades (que es mostren a continuació) s'han afegit automàticament al teu compte de l'AO3.
        open_doors_name: Open Doors (Projecte de Portes Obertes)
        text: 'Has rebut aquest missatge de correu perquè tens obres en un arxiu d''obres de fans que ha estat importat per Open Doors (Projecte de Portes Obertes) (%{open_doors_url}) a l''Archive of Our Own – AO3 (Un Arxiu Propi): %{app_url}. Com que aquesta adreça de correu està connectada a una registrada a l''arxiu importat, les obres associades (que es mostren a continuació) s''han afegit automàticament al teu compte de l''AO3.'
      mistake:
        contact_open_doors: Contacta amb Open Doors
        html: Si hi ha hagut algun error i aquestes no són les teues obres, no les esborres! %{contact_open_doors_link} i ho arreglarem.
        text: Si hi ha hagut algun error i aquestes no són les teues obres, no les esborres! Contacta amb Open Doors (%{open_doors_url}) i ho arreglarem.
      more_info:
        ao3_news: Notícies de l'AO3
        contact_support: contacta amb el Suport de l'AO3
        faq_page: pàgina de Preguntes freqüents
        html: Pots llegir notícies sobre importacions recents a les %{ao3_news_link}, i trobar informació addicional sobre Open Doors a la %{faq_page_link} o la %{tutorial_page_link}. Si tens cap dubte que no haja estat resolt a les Preguntes freqüents, els tutorials, o aquest correu, %{contact_support_link}.
        text: Pots llegir notícies sobre importacions recents a les Notícies de l'AO3 (%{news_url}), i trobar informació addicional sobre Open Doors a la pàgina de Preguntes freqüents (%{open_doors_faq_url}) o la pàgina de tutorials (%{open_doors_tutorial_url}). Si tens cap dubte que no haja estat resolt a les Preguntes freqüents, els tutorials, o aquest correu, contacta amb el Suport de l'AO3 a %{support_url}.
        tutorial_page: pàgina de tutorials
      other_works:
        contact_open_doors: contacta amb Open Doors
        html: Si tens obres a l'arxiu importat que estiguen vinculades a una adreça de correu electrònic a què ja no tens accés, %{contact_open_doors_link} amb qualsevol informació que puga ajudar a verificar la teua identitat.
        text: Si tens obres a l'arxiu importat que estiguen vinculades a una adreça de correu electrònic a què ja no tens accés, contacta amb Open Doors amb qualsevol informació que puga ajudar a verificar la teua identitat.
      questions:
        contact_support: contacta amb el Suport de l'AO3
        html: Per a altres consultes, %{contact_support_link}.
        text: Per qualsevol altra consulta, pots contactar amb el Suport de l'AO3 a %{support_url}.
      redirects:
        html: Per tal de preservar les llistes de recomanacions i els marcadors, les pàgines web de l'arxiu importat poden redirigir a una còpia importada de les obres durant un temps limitat (pots revisar la publicació de la notícia per assegurar-te). Si ja has publicat una còpia d'aquestes obres i %{negation} has utilitzat l'opció d'importar des d'un URL, hi haurà dues còpies de la mateixa obra a l'AO3.
        negation: NOT
      subject: "[%{app_name}] Obres publicades"
      update_redirect:
        contact_open_doors: contactar amb Open Doors
        html: Si vols que Open Doors actualitze la redirecció perquè enllace amb les teues obres preexistents, pots esborrar la còpia importada i %{contact_open_doors_link} amb el teu nom d'usuari o usuària de l'AO3 i de l'arxiu importat, i el títol i URL de l'obra a la qual t'agradaria que es redirigira (si tens diverses obres, pots fer una llista de totes en un mateix missatge).
        text: Si vols que Open Doors actualitze la redirecció perquè enllace amb les teues obres preexistents, pots esborrar la còpia importada i contactar amb Open Doors a %{open_doors_url} incloent el teu nom d'usuari o usuària de l'AO3 i de l'arxiu importat i el títol i URL de l'obra a la qual t'agradaria que es redirigira (si tens diverses obres, pots fer una llista de totes en un mateix missatge).

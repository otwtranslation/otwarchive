        text: Als je wil dat Open Deuren de omleiding updatet zodat hij naar jouw bestaande werk leidt, verwijder dan de geïmporteerde kopie en neem contact op met Open Deuren via %{open_doors_url} met je AO3-accountnaam, je accountnaam op het geïmporteerde archief en de titel en URL van het fanwerk waar je naar wil laten omleiden. (Als je meerdere werken hebt waarvan je de omleiding wil laten wijzigen, kan je deze allemaal in dezelfde e-mail noemen.)

        text: Bergantung kepada arkib, karya anda mungkin telah diimport dihadkan kepada pengguna berdaftar sahaja (untuk tidak dijumpai dalam pencarian Google). Jika ini berlaku, karya-karya tersebut akan hanya diakses oleh pengguna yang telah log masuk melainkan anda memilih untuk membuat karya tersebut jelas sepenuhnya. Untuk bantuan membuka, meyatim, atau memadam karya-karya anda, sila hubungi Bantuan AO3 di %{support_url}.
      email_tips: Jika anda menghubungi kami, sila masukkan alamat e-mel dari @transformativeworks.org ke dalam senarai hubungan selamat anda dan periksa folder spam untuk balasan kami.

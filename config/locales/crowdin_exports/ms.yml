        html: Anda menerima e-mel ini kerana anda mempunyai karya-karya di dalam arkib karya peminat yang telah diimport oleh %{open_doors_name_link} ke dalam %{app_link}. Disebabkan alamat e-mel ini dihubungkan dengan e-mel berdaftar pada arkib tersebut, mana-mana karya yang berkaitan (disenaraikan di bawah) telah dimasukkan secara automatik ke akaun AO3 anda.
        open_doors_name: Open Doors (Projek Pemeliharaan Bahan-Bahan Digital dan Bukan Digital)
        text: 'Anda menerima e-mel ini kerana anda mempunyai karya-karya di dalam arkib karya peminat yang telah diimport oleh Open Doors (Projek Pemeliharaan Bahan-Bahan Digital dan Bukan Digital) (%{open_doors_url}) ke dalam Archive of Our Own – AO3 (Arkib Milik Kita): %{app_url}. Disebabkan alamat e-mel ini dihubungkan dengan e-mel berdaftar pada arkib tersebut, mana-mana karya yang berkaitan (disenaraikan di bawah) telah dimasukkan secara automatik ke akaun AO3 anda.'

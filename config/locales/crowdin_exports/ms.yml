        text: Anda boleh membaca pengumuman mengenai pemindahan arkib terkini di Berita AO3 (%{news_url}), serta mencari informasi tambahan di laman FAQ Open Doors (%{open_doors_faq_url}) atau laman tutorial (%{open_doors_tutorial_url}). Bagi sebarang pertanyaan yang tidak terjawab dalam FAQ, tutorial atau e-mel ini, sila hubungi Bantuan di %{support_url}.

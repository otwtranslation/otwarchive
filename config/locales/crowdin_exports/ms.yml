        text: Jika anda ingin Open Doors untuk mengemas kini ubah hala ke karya anda yang sedia ada, sila padamkan salinan import, dan hubungi Open Doors di %{open_doors_url} dengan nama akaun AO3 anda, nama akaun anda pada arkib import, dan tajuk dan URL karya anda yang ingin dihalakan. (Jika anda mempunyai beberapa karya yang anda ingin menukar ubah hala, anda boleh menyenaraikan dalam satu e-mel.)

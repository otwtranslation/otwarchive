      anonymous_unrevealed_info: Il se peut que les personnes qui maintiennent la collection révèlent votre œuvre tout en la laissant anonyme. Les personnes abonnées à vos mises à jour ne recevront pas de notification lors de ce changement. Une fois révélée, votre œuvre sera incluse dans les listes de tags mais pas dans la page regroupant vos œuvres. Sur l'œuvre, votre nom d'utilisateur-trice sera remplacé par "Anonymous" (Anonyme).

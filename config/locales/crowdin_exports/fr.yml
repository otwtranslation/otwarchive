    claim_notification:
      access:
        contact_support: contacter le support technique d'AO3
        html: Dans certains cas, il se peut que vos œuvres aient été importées de manière à être visibles uniquement pour les utilisateur-trice-s connecté-e-s (afin qu'elles n'apparaissent pas dans les résultats de recherche Google). Si c'est le cas, cette restriction s'appliquera à vos œuvres jusqu'à ce que vous décidiez de les rendre pleinement visibles. Pour savoir comment déverrouiller l'accès à vos œuvres, les supprimer ou les rendre orphelines, veuillez %{contact_support_link}.
        text: Dans certains cas, il se peut que vos œuvres aient été importées de manière à être visibles uniquement pour les utilisateur-trice-s connecté-e-s (afin qu'elles n'apparaissent pas dans les résultats de recherche Google). Si c'est le cas, cette restriction s'appliquera à vos œuvres jusqu'à ce que vous décidiez de les rendre pleinement visibles. Pour savoir comment déverrouiller l'accès à vos œuvres, les supprimer ou les rendre orphelines, veuillez contacter le support technique d'AO3 à l'adresse %{support_url}.
      email_tips: Si vous souhaitez nous contacter, veuillez ajouter le domaine @transformativeworks.org à votre liste de contacts autorisés. Il se peut aussi que notre réponse atterrisse dans vos dossiers de spam.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Notre Propre Archive)
        html: Vous recevez ce message car des œuvres vous appartenant publiées sur une archive d'œuvres de fans ont été importées sur %{app_link} par %{open_doors_name_link}. Cette adresse e-mail étant liée à celle que vous utilisez sur l'archive importée, les œuvres de fans associées ont été ajoutées automatiquement sur votre compte AO3.
        open_doors_name: Open Doors (Portes Ouvertes)
        text: 'Vous recevez ce message car des œuvres vous appartenant, publiées sur une archive d''œuvres de fans, ont été importées sur Archive of Our Own – AO3 (Notre Propre Archive): %{app_url} par notre équipe Open Doors (Portes Ouvertes) (%{open_doors_url}) depuis une archive d''œuvres de fans. Cette adresse e-mail étant liée à celle que vous utilisez sur l''archive importée, les œuvres de fans associées (recensées ci-dessous) ont été ajoutées automatiquement sur votre compte AO3.'
      mistake:
        contact_open_doors: notre équipe Open Doors
        html: 'Si ces œuvres vous ont été attribuées par erreur, nous vous demandons de ne pas les supprimer : contactez simplement %{contact_open_doors_link}, et nous réglerons le problème.'
        text: 'Si ces œuvres vous ont été attribuées par erreur, nous vous demandons de ne pas les supprimer : contactez simplement notre équipe Open Doors (%{open_doors_url}), et nous réglerons le problème.'
      more_info:
        ao3_news: Actualités d'AO3
        contact_support: contacter le support technique d'AO3
        faq_page: FAQ
        html: Vous trouverez les annonces relatives aux importations récentes dans les %{ao3_news_link}. Pour des informations d'ordre plus général, la %{faq_page_link} "Open Doors" et le %{tutorial_page_link} associé sont à votre disposition. Si vous n'y trouvez pas la réponse à vos questions, veuillez %{contact_support_link}.
        text: Vous trouverez les annonces relatives aux importations récentes dans les Actualités d'AO3 (%{news_url}). Pour des informations d'ordre plus général, la FAQ "Open Doors" (%{open_doors_faq_url}) et le tutoriel associé (%{open_doors_tutorial_url}) sont à votre disposition. Si vous n'y trouvez pas la réponse à vos questions, veuillez contacter le support technique d'AO3 à l'adresse %{support_url}.
        tutorial_page: tutoriel
      other_works:
        contact_open_doors: contacter l'équipe Open Doors
        html: Si vous avez publié d'autres œuvres sur l'archive importée, mais que vous n'avez plus accès à l'adresse e-mail associée, veuillez %{contact_open_doors_link} en fournissant un maximum d'informations qui pourraient nous aider à vérifier votre identité.
        text: Si vous avez publié d'autres œuvres sur l'archive importée, mais que vous n'avez plus accès à l'adresse e-mail associée, veuillez contacter l'équipe Open Doors en fournissant un maximum d'informations qui pourraient nous aider à vérifier votre identité.

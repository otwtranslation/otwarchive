          text: 'Si vous ne souhaitez pas que votre œuvre soit anonyme et non révélée, veuillez consulter votre Approved Collection Items page (page des Objets approuvés dans une Collection) afin de la retirer de cette collection : %{collection_items_url}'
        unrevealed:

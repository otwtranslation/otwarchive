          html: Les personnes qui maintiennent %{collection_link} ont changé le statut de votre œuvre %{work_link} en anonyme.
          text: Les personnes qui maintiennent "%{collection_title}" (%{collection_url}) ont changé le statut de votre œuvre "%{work_title}" (%{work_url}) en anonyme.
        anonymous_unrevealed:
          html: Les personnes qui maintiennent %{collection_link} ont changé le statut de votre œuvre %{work_link} pour en faire une œuvre anonyme non révélée.
          text: Les personnes qui maintiennent "%{collection_title}" (%{collection_url}) ont changé le statut de votre œuvre "%{work_title}" (%{work_url}) pour en faire une œuvre anonyme non révélée.
        unrevealed:
          html: Les personnes qui maintiennent %{collection_link} ont changé le statut de votre œuvre %{work_link} pour en faire une œuvre non révélée.
          text: Les personnes qui maintiennent "%{collection_title}" (%{collection_url}) ont changé le statut de votre œuvre "%{work_title}" (%{work_url}) pour en faire une œuvre non révélée.

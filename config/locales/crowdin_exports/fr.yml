---
fr:
  kudo_mailer:
    batch_kudo_notification:
      guest:
        one: un/une invité-e
        other: "%{count} invité-e-s"
      left_kudos:
        html:
          one: "%{givers_list} a félicité votre œuvre %{commentable_link}."
          other: "%{givers_list} ont félicité votre œuvre %{commentable_link}."
        text:
          one: '%{givers_list} a félicité votre œuvre %{commentable_title} (%{commentable_url}).'
          other: '%{givers_list} ont félicité votre œuvre %{commentable_title} (%{commentable_url}).'
      single_guest:
        giver: Un/Une invité-e
        html: "%{giver} a félicité votre œuvre %{commentable_link}."
        text: Un/Une invité-e a félicité votre œuvre %{commentable_title} (%{commentable_url}).
      subject: "[%{app_name}] Vous avez reçu des félicitations !"
  mailer:
    general:
      closing:
        formal: Bien cordialement,
        informal: Cordialement,
      creation:
        link_with_word_count: "%{creation_link} (%{word_count})"
        title_with_chapter_number: Chapitre %{position} de %{title}
        title_with_word_count: '"%{creation_title}" (%{word_count})'
        word_count:
          one: "%{count} mot"
          other: "%{count} mots"
      footer:
        sent_at: Envoyé le %{sent_at}.
      greeting:
        informal:
          addressed_html: Bonjour, %{name} !
          unaddressed: Bonjour !
        introductory: Bonjour de la part d'Archive of Our Own – AO3 (Notre Propre Archive) !
      metadata_label_indicator: ":"
      signature:
        abuse_team: L'équipe Modération d'AO3
        app_short_name: AO3
        open_doors: L'équipe du Projet Open Doors
        parent_org: Organization for Transformative Works – OTW (Organisation pour les Œuvres Transformatives)
        support: L'équipe de Support Technique d'AO3
  user_mailer:
    anonymous_or_unrevealed_notification:
      changed_status:
        anonymous:
          html: Les personnes qui maintiennent %{collection_link} ont changé le statut de votre œuvre %{work_link} en anonyme.
          text: Les personnes qui maintiennent "%{collection_title}" (%{collection_url}) ont changé le statut de votre œuvre "%{work_title}" (%{work_url}) en anonyme.
        anonymous_unrevealed:
          html: Les personnes qui maintiennent %{collection_link} ont changé le statut de votre œuvre %{work_link} pour en faire une œuvre anonyme non révélée.
          text: Les personnes qui maintiennent "%{collection_title}" (%{collection_url}) ont changé le statut de votre œuvre "%{work_title}" (%{work_url}) pour en faire une œuvre anonyme non révélée.
        unrevealed:
          html: Les personnes qui maintiennent %{collection_link} ont changé le statut de votre œuvre %{work_link} pour en faire une œuvre non révélée.
          text: Les personnes qui maintiennent "%{collection_title}" (%{collection_url}) ont changé le statut de votre œuvre "%{work_title}" (%{work_url}) pour en faire une œuvre non révélée.
      collection_items_link_text: Approved Collection Items page (page des Objets approuvés dans une Collection)
      do_not_want:
        anonymous:
          html: Si vous ne souhaitez pas que votre œuvre soit anonyme, veuillez consulter votre %{collection_items_link} afin de la retirer de cette collection.
          text: 'Si vous ne souhaitez pas que votre œuvre soit anonyme, veuillez consulter votre Approved Collection Items page (page des Objets approuvés dans une Collection) afin de la retirer de cette collection : %{collection_items_url}'
        anonymous_unrevealed:
          html: Si vous ne souhaitez pas que votre œuvre soit anonyme et non révélée, veuillez consulter votre %{collection_items_link} afin de la retirer de cette collection.
          text: 'Si vous ne souhaitez pas que votre œuvre soit anonyme et non révélée, veuillez consulter votre Approved Collection Items page (page des Objets approuvés dans une Collection) afin de la retirer de cette collection : %{collection_items_url}'
        unrevealed:
          html: Si vous ne souhaitez pas que votre œuvre soit non révélée, veuillez consulter votre %{collection_items_link} afin de la retirer de cette collection.
          text: 'Si vous ne souhaitez pas que votre œuvre soit non révélée, veuillez consulter votre Approved Collection Items page (page des Objets approuvés dans une Collection) afin de la retirer de cette collection : %{collection_items_url}'
      faq_link_text: FAQ Collections
      more_info:
        html: Pour plus d'information, consultez notre %{faq_link}.
        text: 'Pour plus d''informations, consultez notre FAQ "Collections" : %{faq_url}'
      subject:
        anonymous: "[%{app_name}] Votre œuvre a été rendue anonyme"
        anonymous_unrevealed: "[%{app_name}] Votre œuvre a été rendue anonyme et non révélée"
        unrevealed: "[%{app_name}] Votre œuvre a été changée en œuvre non révélée"
      unrevealed_info: Les œuvres non révélées n'apparaissent pas dans les listes de tags ou sur la page rassemblant vos œuvres. Quiconque suit un lien vers l'œuvre sera informé qu'elle est actuellement non révélée et ne pourra pas accéder à son contenu.
    archivist_added_to_collection_notification:
      approved_collection_items_page: page Approved Collection Items (page des Objets approuvés dans une collection)
      archivist_notice: Puisque les responsables de la collection agissent en leur qualité officielle d'archivistes d'Open Doors (Portes Ouvertes), ils/elles sont autorisé-e-s à ajouter votre œuvre à cette collection, même si vous avez désactivé les invitations à des collections. Les archivistes ajouteront uniquement une œuvre à une collection si elle était hébergée sur une archive importée.
      removal_instructions:
        html: Si vous souhaitez retirer votre œuvre de cette collection, veuillez vous rendre sur votre %{approved_items_link}.
        text: 'Si vous souhaitez retirer votre œuvre de cette collection, veuillez vous rendre sur votre page Approved Collection Items (page des Objets approuvés dans une collection) : %{approved_items_url}.'
      subject: "[%{app_name}][%{collection_title}] Un/Une Archiviste d'Open Doors (Portes Ouvertes) a ajouté votre œuvre à une collection"
      work_added:
        html: Le/La responsable de %{collection_link} a ajouté votre œuvre %{work_link} à sa collection !
        text: Les responsables "%{collection_title}" (%{collection_url}) ont ajouté votre oeuvre "%{work_title}" (%{work_url}) à leur collection !
    challenge_assignment_notification:
      any: Non spécifié
      assignment:
        html: La demande suivante vous a été attribuée dans le cadre du défi %{link} sur Archive of Our Own !
      recipient_missing: 'Aucun-e : contactez un/une modérateur-trice pour demander de l''aide !'
      subject: "[%{app_name}][%{collection_title}] Vous Avez Reçu une Tâche !"
    claim_notification:
      access:
        contact_support: contacter le support technique d'AO3
      email_tips: Si vous souhaitez nous contacter, veuillez ajouter le domaine @transformativeworks.org à votre liste de contacts autorisés. Il se peut aussi que notre réponse atterrisse dans vos dossiers de spam.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Notre Propre Archive)
        open_doors_name: Open Doors (Portes Ouvertes)
      mistake:
        contact_open_doors: notre équipe Open Doors
        html: 'Si ces œuvres vous ont été attribuées par erreur, nous vous demandons de ne pas les supprimer : contactez simplement %{contact_open_doors_link}, et nous réglerons le problème.'
        text: 'Si ces œuvres vous ont été attribuées par erreur, nous vous demandons de ne pas les supprimer : contactez simplement notre équipe Open Doors (%{open_doors_url}), et nous réglerons le problème.'
      more_info:
        ao3_news: Actualités d'AO3
        contact_support: contacter le support technique d'AO3
        faq_page: FAQ
        tutorial_page: tutoriel
      other_works:
        contact_open_doors: contacter l'équipe Open Doors
      questions:
        contact_support: contacter le support technique d'AO3
        html: Pour toute autre demande, merci de %{contact_support_link}.
        text: Pour toute autre demande, merci de contacter le support technique d'AO3 à l'adresse %{support_url}.
      subject: "[%{app_name}] Œuvres importées"
      work_info:
        html: "%{work_link} (%{fandom})"
    creatorship_notification:
      explanation: Lorsque vous êtes co-créateur-trice d'une œuvre, votre nom peut être ajouté à de nouveaux chapitres quels que soient les paramètres de la co-création. Il pourra également être ajouté à toute série à laquelle l'œuvre serait annexée.
      html:
        creation: "%{creation_link} par %{pseud_links}"
        edit_chapter: modifier le chapitre
        edit_series: modifier la série
        remove_chapter: Si votre nom a été ajouté par erreur ou si vous ne souhaitez pas figurer en tant que créateur-trice, vous pouvez %{edit_chapter_link} et en retirer votre nom.
        remove_series: Si votre nom a été ajouté par erreur ou si vous ne souhaitez pas figurer en tant que créateur-trice, vous pouvez %{edit_series_link} et en retirer votre nom.
      intro_chapter: 'L''utilisateur-trice %{adding_user} a ajouté votre pseudo %{pseud} en tant que co-créateur-trice pour le chapitre suivant :'
      intro_series: 'L''utilisateur-trice %{adding_user} a ajouté votre pseudo %{pseud} en tant que co-créateur-trice pour la série suivante :'
      text:
        creation: "%{title} (%{url}) par %{pseuds}"
        remove_chapter: 'Si votre nom a été ajouté par erreur ou si vous ne souhaitez pas figurer en tant que créateur-trice, vous pouvez modifier le chapitre et en retirer votre nom : %{url}'
        remove_series: 'Si votre nom a été ajouté par erreur ou si vous ne souhaitez pas figurer en tant que créateur-trice, vous pouvez modifier la série et en retirer votre nom : %{url}'
    creatorship_notification_archivist:
      explanation: L'utilisateur-trice, en sa qualité d'archiviste officiel-le d'Open Doors (Portes Ouvertes), a la possibilité de vous ajouter sans vous le demander, même si vous avez désactivé la co-création.
      html:
        creation: "%{creation_link} de %{pseud_links}"
        edit_chapter: modifier le chapitre
        edit_series: modifier la série
        edit_work: modifier l'œuvre
        remove_chapter: Si vous avez été ajouté-e par erreur ou ne souhaitez pas apparaître comme créateur-trice, vous pouvez %{edit_chapter_link} pour retirer votre pseudo.
        remove_series: Si vous avez été ajouté-e par erreur ou ne souhaitez pas apparaître comme créateur-trice, vous pouvez %{edit_series_link} pour retirer votre pseudo.
        remove_work: Si vous avez été ajouté-e par erreur ou ne souhaitez pas apparaître comme créateur-trice, vous pouvez %{edit_work_link} pour retirer votre pseudo.
      intro_chapter: 'L''utilisateur-trice %{archivist} a ajouté votre pseudo %{pseud} en tant que co-créateur-trice du chapitre suivant :'
      intro_series: 'L''utilisateur-trice %{archivist} a ajouté votre pseudo %{pseud} en tant que co-créateur-trice de la série suivante :'
      intro_work: 'L''utilisateur-trice %{archivist} a ajouté votre pseudo %{pseud} en tant que co-créateur-trice de l''œuvre suivante :'
      text:
        creation: "%{title} (%{url}) de %{pseuds}"
        remove_chapter: 'Si vous avez été ajouté-e par erreur ou ne souhaitez pas apparaître comme créateur-trice, vous pouvez modifier le chapitre pour retirer votre pseudo : %{url}'
        remove_series: 'Si vous avez été ajouté-e par erreur ou ne souhaitez pas apparaître comme créateur-trice, vous pouvez modifier la série pour retirer votre pseudo : %{url}'
        remove_work: 'Si vous avez été ajouté-e par erreur ou ne souhaitez pas apparaître comme co-créateur-trice, vous pouvez modifier l''œuvre pour retirer votre pseudo : %{url}'
    creatorship_request:
      html:
        creation: "%{creation_link} par %{pseud_links}"
        instructions: Vous pouvez accepter ou refuser cette demande sur la page %{page_name}.
        page_name: Co-Creator Requests (Demandes de Co-création)
      intro_chapter: 'L''utilisateur-trice %{inviting_user} a invité votre pseudo %{pseud} à apparaître en co-création du chapitre suivant :'
      intro_series: 'L''utilisateur-trice %{inviting_user} a invité votre pseudo %{pseud} à apparaître en co-création de la série suivante :'
      intro_work: 'L''utilisateur-trice %{inviting_user} a invité votre pseudo %{pseud} à apparaître en co-création de l''œuvre suivante :'
      text:
        creation: "%{title} (%{url}) par %{pseuds}"
        instructions: 'Vous pouvez accepter ou refuser cette invitation sur la page Co-Creator Requests (Demandes de Co-création) : %{url}'
    delete_work_notification:
      attachment: Ci-joint une copie de votre œuvre pour référence.
      deleted_other:
        html: Votre œuvre %{title} a été supprimée suite à la demande de %{pseud}.
        text: Votre œuvre "%{title}" a été supprimée suite à la demande de %{pseud}.
      deleted_yourself:
        html: Votre œuvre %{title} a été supprimée suite à votre demande.
        text: Votre œuvre "%{title}" a été supprimée suite à votre demande.
      questions:
        html: Si vous avez des questions, veuillez %{support}.
        text: Si vous avez des questions, veuillez %{support} (%{url}).
      subject: "[%{app_name}] Votre œuvre a été supprimée"
      support: contacter le Support Technique
    invite_increase_notification:
      invitation_page_link_text: votre page d'invitations
      subject: "[%{app_name}] Nouvelles Invitations"
    invite_request_declined:
      main:
        one: Nous sommes au regret de vous informer que votre demande de nouvelle invitation ne peut être satisfaite pour le moment.
        other: Nous sommes au regret de vous informer que votre demande de %{count} nouvelles invitations ne peut être satisfaite pour le moment.
      reason: 'Votre demande était la suivante :'
      subject: "[%{app_name}] Demande de Code d'Invitation Supplémentaire Rejetée"
    recipient_notification:
      no_collection: Une œuvre cadeau a été publiée pour vous sur AO3 !
      subject:
        collection: "[%{app_name}][%{collection_title}] Une œuvre cadeau pour vous dans %{collection_title}"
        no_collection: "[%{app_name}] Une œuvre cadeau pour vous"
  users:
    mailer:
      reset_password_instructions:
        subject: "[%{app_name}] Réinitialisation du mot de passe"

        html: Pour toute autre demande, merci de %{contact_support_link}.
        text: Pour toute autre demande, merci de contacter le support technique d'AO3 à l'adresse %{support_url}.
      redirects:
        html: Pour assurer la continuité des listes de recommandation et des marque-pages, il se peut que l'adresse de l'archive importée redirige les utilisateur-trice-s vers la copie importée des œuvres concernées pour une durée limitée (pour savoir si c'est le cas, consultez le billet annonçant l'importation de votre archive). Si vous avez déjà publié une copie de ces œuvres sur AO3 %{negation} passer par notre outil d'importation par URL, il existera deux copies de cette œuvre sur AO3.
      subject: "[%{app_name}] Œuvres importées"
      update_redirect:
        contact_open_doors: contacter l'équipe Open Doors
        html: Si vous souhaitez qu'Open Doors mette à jour la redirection pour l'associer à votre œuvre préexistante, veuillez supprimer la copie importée et %{contact_open_doors_link} en précisant votre nom (ou vos noms) d'utilisateur-trice sur AO3 et sur l'archive importée, ainsi que le titre et l'URL de l'œuvre vers laquelle vous souhaitez programmer la redirection. (Si vous souhaitez effectuer cette opération pour plusieurs œuvres, vous pouvez en dresser la liste dans un même e-mail.)
        text: Si vous souhaitez qu'Open Doors mette à jour la redirection pour l'associer à votre œuvre préexistante, veuillez supprimer la copie importée et contacter l'équipe Open Doors à l'adresse %{open_doors_url} en précisant votre nom (ou vos noms) d'utilisateur-trice sur AO3 et sur l'archive importée, ainsi que le titre et l'URL de l'œuvre vers laquelle vous souhaitez programmer la redirection. (Si vous souhaitez effectuer cette opération pour plusieurs œuvres, vous pouvez en dresser la liste dans un même e-mail.)

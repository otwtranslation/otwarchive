      guest:
        one: ein Gast
        other: "%{count} Gäste"
      left_kudos:
        html:
          one: "%{givers_list} hat Kudos für %{commentable_link} hinterlassen."
          other: "%{givers_list} haben Kudos für %{commentable_link} hinterlassen."
        text:
          one: '%{givers_list} hat Kudos für %{commentable_title} (%{commentable_url}) hinterlassen.'
          other: '%{givers_list} haben Kudos für %{commentable_title} (%{commentable_url}) hinterlassen.'
      single_guest:
        giver: Ein Gast
        html: "%{giver} hat Kudos für %{commentable_link} hinterlassen."
        text: Ein Gast hat Kudos für %{commentable_title} (%{commentable_url}) hinterlassen.
      subject: "[%{app_name}] Du hast Kudos erhalten!"
  mailer:
    general:
      closing:
        formal: Mit freundlichen Grüßen
        informal: Viele Grüße
      creation:
        link_with_word_count: "%{creation_link} (%{word_count})"
        title_with_chapter_number: Kapitel %{position} von %{title}
        title_with_word_count: '"%{creation_title}" (%{word_count})'
        word_count:
          one: "%{count} Wort"
          other: "%{count} Worte"
      footer:
        sent_at: Gesendet %{sent_at}.
      greeting:
        informal:
          addressed_html: Hallo %{name}!
          unaddressed: Hallo!
        introductory: Hallo vom Archive of Our Own – AO3 (Ein Eigenes Archiv)
      metadata_label_indicator: ":"
      signature:
        abuse_team: Das AO3 Richtlinien und Missbrauch-Team
        app_short_name: AO3
        open_doors: Das Open Doors (Offene Türen)-Team
        parent_org: Organization for Transformative Works – OTW (Organisation für Transformative Werke)
        support: Das AO3-Support-Team
  user_mailer:
    anonymous_or_unrevealed_notification:
      changed_status:
        anonymous:
          html: die Betreuer*innen von %{collection_link} haben den Status Deines Werks %{work_link} auf anonym gesetzt.
          text: die Betreuer*innen von "%{collection_title}" (%{collection_url}) haben den Status Deines Werks "%{work_title}" (%{work_url}) auf anonym gesetzt.
        anonymous_unrevealed:
          html: die Betreuer*innen von %{collection_link} haben den Status Deines Werks %{work_link} auf anonym und verborgen gesetzt.
          text: die Betreuer*innen von "%{collection_title}" (%{collection_url}) haben den Status Deines Werks "%{work_title}" (%{work_url}) auf anonym und verborgen gesetzt.
        unrevealed:
          html: die Betreuer*innen von %{collection_link} haben den Status Deines Werks %{work_link} auf verborgen gesetzt.
          text: die Betreuer*innen von "%{collection_title}" (%{collection_url}) haben den Status Deines Werks "%{work_title}" (%{work_url}) auf verborgen gesetzt.
      collection_items_link_text: Approved Collection Items (Seite für genehmigte Objekte einer Sammlung)
      do_not_want:
        anonymous:
          html: Wenn Du nicht möchtest, dass Dein Werk anonym angezeigt wird, dann besuche bitte die %{collection_items_link} und entferne es aus der Sammlung.
          text: 'Wenn Du nicht möchtest, dass Dein Werk anonym angezeigt wird, dann besuche bitte Deine Approved Collection Items (Seite für genehmigte Objekte einer Sammlung) und entferne es aus der Sammlung: %{collection_items_url}'
        anonymous_unrevealed:
          html: Wenn Du nicht möchtest, dass Dein Werk anonym und verborgen ist, dann besuche bitte die %{collection_items_link} und entferne es aus der Sammlung.
          text: 'Wenn Du nicht möchtest, dass Dein Werk anonymisiert und verborgen wird, dann besuche bitte Deine Approved Collection Items (Seite für genehmigte Objekte einer Sammlung) und entferne es aus der Sammlung: %{collection_items_url}'
        unrevealed:
          html: Wenn Du nicht möchtest, dass Dein Werk verborgen ist, dann besuche bitte die %{collection_items_link} und entferne es aus der Sammlung.
          text: 'Wenn Du nicht möchtest, dass Dein Werk verborgen wird, dann besuche bitte Deine Approved Collection Items (Seite für genehmigte Objekte einer Sammlung) und entferne es aus der Sammlung: %{collection_items_url}'
      faq_link_text: Herausforderungen FAQ (Häufige Fragen)
      more_info:
        html: Weitere Informationen findest Du in unserer %{faq_link}.
        text: 'Weitere Informationen findest Du in unseren Herausforderungen FAQ (Häufige Fragen): %{faq_url}'
      subject:
        anonymous: "[%{app_name}] Dein Werk wurde anonymisiert"
        anonymous_unrevealed: "[%{app_name}] Dein Werk wurde anonymisiert und verborgen"
        unrevealed: "[%{app_name}] Dein Werk wurde verborgen"
      unrevealed_info: Verborgene Werke werden nicht in Tag-Listen oder auf Deiner Werke-Seite angezeigt. Jemand, der auf den Link zu Deinem Werk klickt, erhält eine Nachricht, dass es zurzeit verborgen ist und kann darauf nicht zugreifen.
    archivist_added_to_collection_notification:
      approved_collection_items_page: Seite für Approved Collection Items (Zugelassene Sammlungsgegenstände)
      archivist_notice: Weil die Sammlungsinhaber*innen in ihrer Eigenschaft als offizielle Open Doors (Offene Türen) Archivar*innen gehandelt haben, ist es ihnen erlaubt, Dein Werk zu dieser Sammlung hinzuzufügen, auch wenn Du Sammlungseinladungen deaktiviert hast. Archivar*innen werden nur Dein Werk zu einer Sammlung hinzufügen, wenn es in einem importierten Archiv gehostet wird.
      removal_instructions:
        html: 'Wenn Du Dein Werk von dieser Sammlung entfernen möchtest, verwende diesen Link: %{approved_items_link}.'
        text: 'Wenn Du Dein Werk aus dieser Sammlung entfernen möchtest, besuche bitte Deine Seite für Approved Collection Items (Zugelassene Sammlungsgegenstände): %{approved_items_url}.'
      subject: "[%{app_name}][%{collection_title}] Ein*e Open Doors (Offene Türen) Archivar*in hat Dein Werk zu einer Sammlung hinzugefügt."
      work_added:
        html: Die Sammlungsinhaber*innen von %{collection_link} haben Dein Werk %{work_link} zu ihrer Sammlung hinzugefügt!
        text: Die Sammlungsinhaber*innen von "%{collection_title}" (%{collection_url}) haben Dein Werk "%{work_title}" (%{work_url}) zu ihrer Sammlung hinzugefügt!
    challenge_assignment_notification:
      any: Jegliche
      assignment:
        html: Dir wurde folgender Wunsch in der Herausforderung %{link} im AO3 zugewiesen!
      recipient_missing: 'Niemand: bitte eine*n Moderator*in um Hilfe!'
      subject: "[%{app_name}][%{collection_title}] Deine Aufgabe!"
    claim_notification:
      access:
        contact_support: kontaktiere den AO3 Support
      email_tips: Wenn Du uns kontaktierst, füge bitte E-Mail-Adressen von @transformativeworks.org zur Liste Deiner sicheren Kontakte und prüfe Deinen Spam-Ordner auf unsere Antwort.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Ein Eigenes Archiv)
        open_doors_name: Open Doors (Offene Türen)
      mistake:
        contact_open_doors: kontaktiere Open Doors
        html: Wenn wir einen Fehler gemacht haben und die Werke nicht Dir gehören, lösch sie bitte nicht! Bitte %{contact_open_doors_link} und wir beheben den Fehler.
        text: Wenn wir einen Fehler gemacht haben und das nicht Deine Werke sind, lösch sie bitte nicht! Bitte kontaktiere nur Open Doors (%{open_doors_url}) und wir werden den Fehler beheben.
      more_info:
        ao3_news: AO3-News
        contact_support: kontaktiere den AO3 Support
        faq_page: Seite für häufig gestellte Fragen (FAQ)
        tutorial_page: Tutorial-Seite
      other_works:
        contact_open_doors: kontaktiere Open Doors
      questions:
        contact_support: kontaktiere den AO3 Support
        html: Für andere Anfragen, bitte %{contact_support_link}.
        text: Bei weiteren Anfragen, kontaktiere bitte den AO3 Support unter %{support_url}.
      subject: "[%{app_name}] Werke hochgeladen"
      work_info:
        html: "%{work_link} (%{fandom})"
    creatorship_notification:
      explanation: Wenn Du Mitschöpfer*in eines Werkes bist, kannst Du zu neuen Kapiteln hinzugefügt werden, unabhängig von Deinen Einstellungen für Mitschöpfungen. Wenn das Werk zu einer Serie hinzugefügt wird, wirst Du zu dieser ebenfalls hinzugefügt.
      html:
        creation: "%{creation_link} von %{pseud_links}"
        edit_chapter: das Kapitel bearbeiten
        edit_series: die Serie bearbeiten
        remove_chapter: Wenn Du versehentlich hinzugefügt wurdest oder nicht als Schöpfer*in aufgeführt werden möchtest, kannst Du %{edit_chapter_link}, um Dich selbst als Schöpfer*in zu entfernen.
        remove_series: Wenn Du versehentlich hinzugefügt wurdest oder nicht als Schöpfer*in aufgeführt werden möchtest, kannst Du %{edit_series_link}, um Dich selbst als Schöpfer*in zu entfernen.
      intro_chapter: 'Der/die Benutzer*in %{adding_user} hat Dein Pseudonym %{pseud} als Mitschöpfer*in zu folgendem Kapitel hinzugefügt:'
      intro_series: 'Der/die Benutzer*in %{adding_user} hat Dein Pseudonym %{pseud} als Mitschöpfer*in zur folgenden Serie hinzugefügt:'
      text:
        creation: "%{title} (%{url}) von %{pseuds}"
        remove_chapter: 'Wenn Du versehentlich hinzugefügt wurdest oder nicht als Schöpfer*in aufgeführt werden möchtest, kannst Du das Kapitel bearbeiten, um Dich selbst als Schöpfer*in zu entfernen: %{url}'
        remove_series: 'Wenn Du versehentlich hinzugefügt wurdest oder nicht als Schöpfer*in aufgeführt werden möchtest, kannst Du die Serie bearbeiten, um Dich selbst als Schöpfer*in zu entfernen: %{url}'
    creatorship_notification_archivist:
      explanation: In der Funktion als Archivist*in von Open Doors (Offene Türen) darf er/sie Dich ohne Anfrage hinzufügen, selbst wenn Du die Option, als Mitschöpfer*in geführt zu werden, deaktiviert hast.
      html:
        creation: "%{creation_link} von %{pseud_links}"
        edit_chapter: das Kapitel bearbeiten
        edit_series: die Serie bearbeiten
        edit_work: das Werk bearbeiten
        remove_chapter: Falls Du irrtümlicherweise hinzugefügt wurdest oder nicht als Schöpfer*in angezeigt werden möchtest, kannst Du %{edit_chapter_link}, um Dich als Schöpfer*in zu entfernen.
        remove_series: Falls Du irrtümlicherweise hinzugefügt wurdest oder nicht als Schöpfer*in angezeigt werden möchtest, kannst Du %{edit_series_link}, um Dich als Schöpfer*in zu entfernen.
        remove_work: Falls Du irrtümlicherweise hinzugefügt wurdest oder nicht als Schöpfer*in angezeigt werden möchtest, kannst Du %{edit_work_link}, um Dich als Schöpfer*in zu entfernen.
      intro_chapter: 'Der/Die Benutzer*in %{archivist} hat Dein Pseudonym %{pseud} als Mitschöpfer*in zu folgendem Kapitel hinzugefügt:'
      intro_series: 'Der/Die Benutzer*in %{archivist} hat Dein Pseudonym %{pseud} als Mitschöpfer*in zur folgenden Serie hinzugefügt:'
      intro_work: 'Der/Die Benutzer*in %{archivist} hat Dein Pseudonym %{pseud} als Mitschöpfer*in zu folgendem Werk hinzugefügt:'
      text:
        creation: "%{title} (%{url}) von %{pseuds}"
        remove_chapter: 'Falls Du irrtümlicherweise hinzugefügt wurdest oder nicht als Schöpfer*in angezeigt werden möchtest, kannst Du das Kapitel bearbeiten, um Dich als Schöpfer*in zu entfernen: %{url}'
        remove_series: 'Falls Du irrtümlicherweise hinzugefügt wurdest oder nicht als Schöpfer*in angezeigt werden möchtest, kannst Du die Serie bearbeiten, um Dich als Schöpfer*in zu entfernen: %{url}'
        remove_work: 'Falls Du irrtümlicherweise hinzugefügt wurdest oder nicht als Schöpfer*in angezeigt werden möchtest, kannst Du das Werk bearbeiten, um Dich als Schöpfer*in zu entfernen: %{url}'
    creatorship_request:
      html:
        creation: "%{creation_link} von %{pseud_links}"
        instructions: Du kannst diese Anfrage auf deiner "%{page_name}"-Seite annehmen oder ablehnen.
        page_name: Co-Creator Requests (Mitschöpfer*innen-Anfragen)
      intro_chapter: 'dein Pseud %{pseud} wurde von %{inviting_user} eingeladen, als Mitschöpfer*in des folgenden Kapitels aufgeführt zu werden:'
      intro_series: 'dein Pseud %{pseud} wurde von %{inviting_user} eingeladen, als Mitschöpfer*in der folgenden Serie aufgeführt zu werden:'
      intro_work: 'dein Pseud %{pseud} wurde von %{inviting_user} eingeladen, als Mitschöpfer*in des folgenden Werkes aufgeführt zu werden:'
      text:
        creation: "%{title} (%{url}) von %{pseuds}"
        instructions: 'Du kannst diese Anfrage auf deiner "Co-Creator Requests"- (Mitschöpfer*innen-Anfragen) Seite annehmen oder ablehnen: %{url}'
    delete_work_notification:
      attachment: Anbei ist eine Kopie Deines Werkes, als Referenz für Dich.
      deleted_other:
        html: Dein Werk %{title} wurde gemäß Anfrage von %{pseud} gelöscht.
        text: Dein Werk "%{title}" wurde gemäß Anfrage von %{pseud} gelöscht.
      deleted_yourself:
        html: Dein Werk %{title} wurde gemäß Deiner Anfrage gelöscht.
        text: Dein Werk "%{title}" wurde gemäß Deiner Anfrage gelöscht.
      questions:
        html: Wenn Du Fragen hast, %{support}.
        text: Falls Du Fragen hast, bitte %{support} (%{url}).
      subject: "[%{app_name}] Dein Werk wurde gelöscht"
      support: kontaktiere bitte den Support
    invite_increase_notification:
      invitation_page_link_text: Deiner Invitations (Einladungs)-Seite
      subject: "[%{app_name}] Neue Einladungen"
    invite_request_declined:
      main:
        one: leider können wir Deine Anfrage für eine neue Einladung zurzeit nicht erfüllen.
        other: leider können wir Deine Anfrage für %{count} neue Einladungen zurzeit nicht erfüllen.
      reason: 'Deine Anfrage war:'
      subject: "[%{app_name}] Anfrage nach zusätzlichen Einladungscodes abgelehnt"
    recipient_notification:
      no_collection: Ein Geschenk-Fanwerk wurde für Dich im AO3 veröffentlicht.
      subject:
        collection: "[%{app_name}][%{collection_title}] Ein Geschenk-Fanwerk für Dich in %{collection_title}"
        no_collection: "[%{app_name}] Ein Geschenk-Fanwerk für Dich"

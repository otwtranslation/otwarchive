        text: dein Werk "%{title}" wurde von einem*r Webadministrator*in des AO3 gelöscht.
      html:
        tos_violation: Wenn dein Werk eventuell die Nutzungsbedingungen des AO3 verletzt hat, %{contact_abuse_link}.
      import_project:
        html: Falls dein Werk Teil eines Import-Projektes durch unser Open Doors- (Offene Türen) Komitee war, %{opendoors_link} für alle weiteren Fragen.

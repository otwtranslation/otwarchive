    claim_notification:
      access:
        contact_support: kontaktiere den AO3 Support
        html: Je nach Archiv kann es sein, dass Deine Werke nur für registrierte Nutzer importiert wurden (um sie aus der Google-Suche herauszuhalten). Wenn dies der Fall ist, sind die Werke nur für eingeloggte Benutzer zugänglich, außer, Du machst sie vollständig sichtbar. Wenn Du Hilfe beim Freischalten, Auswildern oder Löschen Deiner Werke benötigst, %{contact_support_link}.
        text: Je nach Archiv kann es sein, dass Deine Werke nur für registrierte Nutzer importiert wurden (um sie aus der Google-Suche herauszuhalten). Wenn dies der Fall ist, sind die Werke nur für eingeloggte Benutzer zugänglich, außer, Du machst sie vollständig sichtbar. Wenn Du Hilfe beim Freischalten, Auswildern oder Löschen Deiner Werke benötigst, wende Dich bitte an AO3 Support unter %{support_url}.
      email_tips: Wenn Du uns kontaktierst, füge bitte E-Mail-Adressen von @transformativeworks.org zur Liste Deiner sicheren Kontakte und prüfe Deinen Spam-Ordner auf unsere Antwort.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Ein Eigenes Archiv)
        html: Du bekommst diese E-Mail, weil Du Werke in einem Fanwerk-Archiv hattest, das von %{open_doors_name_link} in %{app_link} importiert wurde. Weil diese E-Mail-Adresse mit einer im importierten Archiv registrierten Adresse verbunden ist, wurden die zugehörigen Fanwerke (siehe unten) automatisch zu deinem AO3-Konto hinzugefügt.
        open_doors_name: Open Doors (Offene Türen)
        text: 'Du bekommst diese E-Mail, weil Du Werke in einem Fanwerke-Archiv hattest, die von Open Doors (Offene Türen) (%{open_doors_url}) ins Archive of Our Own – AO3 (Ein Eigenes Archiv): %{app_url} importiert wurden. Weil diese E-Mail Adresse mit einer im importierten Archiv registrierten Adresse verbunden ist, wurden die zugehörigen Fanwerke (siehe unten) automatisch zu Deinem AO3-Konto hinzugefügt.'
      mistake:
        contact_open_doors: kontaktiere Open Doors
        html: Wenn wir einen Fehler gemacht haben und die Werke nicht Dir gehören, lösch sie bitte nicht! Bitte %{contact_open_doors_link} und wir beheben den Fehler.
        text: Wenn wir einen Fehler gemacht haben und das nicht Deine Werke sind, lösch sie bitte nicht! Bitte kontaktiere nur Open Doors (%{open_doors_url}) und wir werden den Fehler beheben.
      more_info:
        ao3_news: AO3-News
        contact_support: kontaktiere den AO3 Support
        faq_page: Seite für häufig gestellte Fragen (FAQ)
        html: Du kannst Ankündigungen über die jüngsten Archivumzüge unter %{ao3_news_link} lesen und zusätzliche Informationen auf der Offene Türen %{faq_page_link} oder %{tutorial_page_link} finden. Für andere Fragen, die nicht in dieser Mail, den FAQ oder den Anleitungen beantwortet werden, %{contact_support_link}.
        text: Du kannst Ankündigungen über die jüngsten Archivumzüge unter (%{news_url}) lesen und zusätzliche Informationen auf der Open Doors Häufig gestellte Fragen (FAQ) Seite (%{open_doors_faq_url}) oder Anleitungs Seite (%{open_doors_tutorial_url}). Für andere Fragen, die nicht in dieser Mail, den FAQ oder den Anleitungen beantwortet werden, kontaktiere bitte den Support unter %{support_url}.
        tutorial_page: Tutorial-Seite
      other_works:
        contact_open_doors: kontaktiere Open Doors
        html: Wenn Du andere Werke im importierten Archiv unter einer E-Mail-Adresse hattest, die du nicht mehr aufrufen kannst, bitte %{contact_open_doors_link} mit allen Informationen, die zur Überprüfung Deiner Identität beitragen können.
        text: Wenn Du andere Werke im importierten Archiv unter einer E-Mail Adresse hattest, die Du nicht mehr aufrufen kannst, bitte kontaktiere Open Doors mit allen Informationen, die zur Überprüfung Deiner Identität beitragen können.
      questions:
        contact_support: kontaktiere den AO3 Support
        html: Für andere Anfragen, bitte %{contact_support_link}.
        text: Bei weiteren Anfragen, kontaktiere bitte den AO3 Support unter %{support_url}.
      redirects:
        html: Um Empfehlungslisten und Lesezeichen zu bewahren, werden die Webadressen des importierten Archivs möglicherweise für eine begrenzte Zeit auf die importierte Kopie dieser Werke umgeleitet (überprüfe die Ankündigung Deines Archivs, um sicher zu sein). Wenn Du bereits eine Kopie dieser Werke hochgeladen und %{negation} die Funktion "Importieren von URL" genutzt hast, werden zwei Kopien desselben Werkes auf AO3 existieren.
        negation: NOT
      subject: "[%{app_name}] Werke hochgeladen"
      update_redirect:
        contact_open_doors: kontaktiere Open Doors
        html: Wenn Du möchtest, dass Open Doors die Weiterleitung auf Dein bereits vorhandenes Werk aktualisiert, lösche bitte die importierte Kopie und %{contact_open_doors_link} mit Deinem AO3 Kontonamen, Deinem Kontonamen im importieren Archiv sowie dem Titel und der URL des Fanwerks, auf das die Weiterleitung verweisen soll. (Wenn Du bei mehreren Werken die Weiterleitung ändern möchtest, kannst Du diese in einer Mail auflisten.)
        text: Wenn Du möchtest, dass Open Doors die Weiterleitung auf Dein bereits vorhandenes Werk aktualisiert, lösche bitte die importierte Kopie und kontaktiere Open Doors unter %{open_doors_url} mit Deinem AO3 Kontonamen, Deinem Kontonamen im importieren Archiv sowie dem Titel und der URL des Fanwerks, auf das die Weiterleitung verweisen soll. (Wenn Du bei mehreren Werken die Weiterleitung ändern möchtest, kannst Du diese in einer E-Mail auflisten.)
      work_info:
        html: "%{work_link} (%{fandom})"
        text:
          no_fandom: "- %{work_title} %{work_url}"
          with_fandom: "- %{work_title} %{work_url} (%{fandom})"
      works_by: 'Diese Werke wurden unter der E-Mail %{email} geschrieben'

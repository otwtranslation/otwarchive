        open_doors_name: Open Doors (Pintu Terbuka)
        text: 'Anda menerima surel ini karena Anda memiliki karya di arsip karya fan yang telah diimpor oleh Open Doors (Pintu Terbuka) (%{open_doors_url}) ke Archive of Our Own – AO3 (Arsip Milik Kita): %{app_url}. Karena alamat surel ini terhubung dengan alamat surel yang terdaftar di arsip yang diimpor, maka karya fan terkait (tercantum di bawah ini) telah secara otomatis ditambahkan ke akun AO3 Anda.'

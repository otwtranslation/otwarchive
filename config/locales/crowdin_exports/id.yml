        text: Menyesuaikan dengan arsipnya, karya Anda mungkin telah diimpor secara terbatas hanya untuk pengguna yang terdaftar (untuk mencegah agar tidak muncul di pencarian Google). Jika demikian, maka karya-karya tersebut hanya dapat diakses oleh pengguna yang sudah masuk ke akun AO3, kecuali jika Anda memilih untuk membuatnya terbuka untuk umum. Untuk bantuan dalam mengubah pengaturan karya menjadi terbuka untuk umum, orphaning (meninggalkan karya), atau menghapus karya, silakan hubungi Komite Bantuan AO3 di %{support_url}.
      email_tips: Jika Anda menghubungi kami, harap tambahkan alamat surel dari @transformativeworks.org ke dalam daftar pengirim aman dan periksa folder spam Anda untuk menemukan balasan dari kami.

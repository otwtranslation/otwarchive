        text: Anda dapat membaca pengumuman mengenai pemindahan arsip terbaru di Berita AO3 (%{news_url}), dan menemukan informasi tambahan di halaman Pertanyaan Umum (%{open_doors_faq_url}) atau halaman tutorial (%{open_doors_tutorial_url}) milik Pintu Terbuka. Untuk pertanyaan yang tidak terjawab dalam Pertanyaan Umum, tutorial, atau surel ini, silakan hubungi Komite Bantuan AO3 di %{support_url}.

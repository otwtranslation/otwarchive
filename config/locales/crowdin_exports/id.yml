        text: Jika Anda ingin Pintu Terbuka memperbarui pengalihan tautan untuk mengarahkan ke karya Anda yang sudah ada sebelumnya, hapus salinan yang telah diimpor, dan hubungi Pintu Terbuka di %{open_doors_url} dengan nama akun AO3 Anda, nama akun Anda di arsip yang telah diimpor, dan judul beserta URL dari karya fan yang ingin Anda jadikan sebagai tujuan dari pengalihan tautan. (Jika Anda memiliki lebih dari satu karya yang ingin Anda ubah pengalihan tautannya, Anda dapat mencantumkan semuanya di dalam satu surel.)

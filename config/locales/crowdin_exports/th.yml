        text: ผลงานของคุณอาจถูกนำเข้ามาให้เฉพาะผู้ใช้ที่ลงทะเบียนแล้วอ่านได้เท่านั้น ขึ้นอยู่กับการตั้งค่าบนไฟล์ต้นฉบับ (เพื่อป้องกันไม่ให้ถูกค้นหาจาก Google ได้) ในกรณีนี้ ผู้ใช้ที่เข้าสู่ระบบเท่านั้นที่จะสามารถเข้าถึงผลงานได้ เว้นแต่คุณจะเลือกให้มองเห็นผลงานได้ทั้งหมด หากต้องการความช่วยเหลือในการปลดล็อก ทอดทิ้งผลงาน หรือลบผลงานของคุณ โปรดติดต่อฝ่ายบริการช่วยเหลือที่ %{support_url}

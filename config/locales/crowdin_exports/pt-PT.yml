---
pt:
  kudo_mailer:
    batch_kudo_notification:
      guest:
        one: uma pessoa convidada
        other: "%{count} pessoas convidadas"
      left_kudos:
        html:
          one: "%{givers_list} deixou kudos em %{commentable_link}."
          other: "%{givers_list} deixaram kudos em %{commentable_link}."
        text:
          one: '%{givers_list} deixou kudos em %{commentable_title} (%{commentable_url}).'
          other: '%{givers_list} deixaram kudos em %{commentable_title} (%{commentable_url}).'
      single_guest:
        giver: Uma pessoa convidada
        html: "%{giver} deixou kudos em %{commentable_link}."
        text: Uma pessoa convidada deixou kudos em %{commentable_title} (%{commentable_url}).
      subject: "[%{app_name}] Recebeste kudos!"
  mailer:
    general:
      closing:
        formal: Atenciosamente,
        informal: Atenciosamente,
      creation:
        link_with_word_count: "%{creation_link} (%{word_count})"
        title_with_chapter_number: Capítulo %{position} de %{title}
        title_with_word_count: '"%{creation_title}" (%{word_count})'
        word_count:
          one: "%{count} palavra"
          other: "%{count} palavras"
      footer:
        sent_at: Enviado às %{sent_at}.
      greeting:
        informal:
          addressed_html: Olá, %{name}!
          unaddressed: Olá!
        introductory: Olá do Archive of Our Own – AO3 (O Nosso Próprio Arquivo)!
      metadata_label_indicator: ":"
      signature:
        abuse_team: A equipa de Políticas e Abuso do AO3
        app_short_name: AO3
        open_doors: A equipa do Open Doors (Portas Abertas)
        parent_org: Organization for Transformative Works – OTW (Organização para Obras Transformativas)
        support: A equipa de Suporte do AO3
  user_mailer:
    anonymous_or_unrevealed_notification:
      changed_status:
        anonymous:
          html: As pessoas responsáveis por manter a coleção %{collection_link} alteraram o estado da tua obra %{work_link} para "anónima".
          text: As pessoas responsáveis por manter a coleção "%{collection_title}" (%{collection_url}) alteraram o estado da tua obra "%{work_title}" (%{work_url}) para "anónima".
        anonymous_unrevealed:
          html: As pessoas responsáveis por manter a coleção %{collection_link} alteraram o estado da tua obra %{work_link} para "anónima" e "não revelada".
          text: As pessoas responsáveis por manter a coleção "%{collection_title}" (%{collection_url}) alteraram o estado da tua obra "%{work_title}" (%{work_url}) para "anónima" e "não revelada".
        unrevealed:
          html: As pessoas responsáveis por manter a coleção %{collection_link} alteraram o estado da tua obra %{work_link} para "não revelada".
          text: As pessoas responsáveis por manter a coleção "%{collection_title}" (%{collection_url}) alteraram o estado da tua obra "%{work_title}" (%{work_url}) para "não revelada".
      collection_items_link_text: página de Approved Collection Items (Itens de Coleção Aprovados)
      do_not_want:
        anonymous:
          html: Se não queres que a tua obra seja anónima, por favor visita a tua %{collection_items_link} para a remover desta coleção.
          text: 'Se não queres que a tua obra seja anónima, por favor visita a tua página de Approved Collection Items (Itens de Coleção Aprovados) para a remover desta coleção: %{collection_items_url}'
        anonymous_unrevealed:
          html: Se não queres que a tua obra seja anónima e fique inacessível até ser revelada, por favor visita a tua %{collection_items_link} para a remover desta coleção.
          text: 'Se não queres que a tua obra seja anónima e fique inacessível até ser revelada, por favor visita a tua página de Approved Collection Items (Itens de Coleção Aprovados) para a remover desta coleção: %{collection_items_url}'
        unrevealed:
          html: Se não queres que a tua obra fique inacessível até ser revelada, por favor visita a tua %{collection_items_link} para a remover desta coleção.
          text: 'Se não queres que a tua obra fique inacessível até ser revelada, por favor visita a tua página de Approved Collection Items (Itens de Coleção Aprovados) para a remover desta coleção: %{collection_items_url}'
      faq_link_text: FAQs sobre Coleções
      more_info:
        html: Para mais informações, visita as nossas %{faq_link}.
        text: 'Para mais informações, visita as nossas FAQs sobre Coleções: %{faq_url}.'
      subject:
        anonymous: "[%{app_name}] A tua obra foi tornada anónima"
        anonymous_unrevealed: "[%{app_name}] A tua obra foi tornada anónima e não revelada"
        unrevealed: "[%{app_name}] A tua obra foi tornada numa obra não revelada"
      unrevealed_info: Obras não reveladas não são incluídas nas listas de tags ou na tua página de obras. Qualquer pessoa que siga uma ligação para a obra vai receber um aviso a indicar que, atualmente, não está revelada e que não poderá aceder ao seu conteúdo.
    archivist_added_to_collection_notification:
      approved_collection_items_page: página Approved Collection Items (Itens de Coleção Aprovados)
      archivist_notice: Como as pessoas responsáveis pela coleção estão a agir na sua função oficial como arquivista do Open Doors (Portas Abertas), podem adicionar a tua obra a esta coleção, mesmo que tenhas desativado a opção de convites para coleções. As pessoas arquivistas só irão adicionar uma obra a uma coleção se a obra estava alojada num arquivo importado.
      removal_instructions:
        html: Se quiseres remover a tua obra desta coleção, por favor visita a tua %{approved_items_link}.
        text: 'Se quiseres remover a tua obra desta coleção, por favor visita a tua página Approved Collection Items (Itens de Coleção Aprovados): %{approved_items_url}.'
      subject: "[%{app_name}][%{collection_title}] Uma pessoa arquivista do Open Doors (Portas Abertas) adicionou a tua obra a uma coleção"
      work_added:
        html: As pessoas responsáveis pela coleção %{collection_link} adicionaram a tua obra %{work_link} à sua coleção!
        text: As pessoas responsáveis pela coleção "%{collection_title}" (%{collection_url}) adicionaram a tua obra "%{work_title}" (%{work_url}) à sua coleção!
    challenge_assignment_notification:
      any: Qualquer
      assignment:
        html: Foi-te atribuída a seguinte tarefa no desafio %{link} no AO3!
      recipient_missing: 'Ninguém: contacta uma pessoa moderadora para obter ajuda!'
      subject: "[%{app_name}][%{collection_title}] A Tua Tarefa!"
    claim_notification:
      access:
        contact_support: contacta a equipa de Suporte do AO3
      email_tips: Se nos contactares, por favor adiciona os endereços de email @transformativeworks.org à tua lista de contactos seguros e verifica se a nossa resposta está nas tuas pastas de spam.
      introduction:
        ao3_name: Archive of Our Own – AO3 (O Nosso Próprio Arquivo)
        open_doors_name: Open Doors (Portas Abertas)
      mistake:
        contact_open_doors: contacta o Portas Abertas
        html: Se isto for um engano e estas obras não forem tuas, por favor não as apagues! Por favor %{contact_open_doors_link} e nós trataremos do assunto.
        text: Se isto for um engano e estas obras não forem tuas, por favor não as apagues! Por favor contacta o Portas Abertas (%{open_doors_url}) e nós trataremos do assunto.
      more_info:
        ao3_news: Notícias do AO3
        contact_support: contacta a equipa de Suporte do AO3
        faq_page: página de Perguntas Frequentes (FAQs)
        tutorial_page: página dos tutoriais
      other_works:
        contact_open_doors: contacta o Portas Abertas
      questions:
        contact_support: contacta a equipa de Suporte do AO3
        html: Para outras questões, por favor %{contact_support_link}.
        text: Para outras questões, por favor contacta a equipa de Suporte do AO3 em %{support_url}.
      subject: "[%{app_name}] Obras publicadas"
      work_info:
        html: "%{work_link} (%{fandom})"
    creatorship_notification:
      explanation: Quando és pessoa cocriadora numa obra, podes ser adicionada a novos capítulos, independentemente das tuas definições de cocriação. Podes ainda ser adicionada a quaisquer séries às quais a obra for adicionada.
      html:
        creation: "%{creation_link} por %{pseud_links}"
        edit_chapter: editar o capítulo
        edit_series: editar a série
        remove_chapter: Se te adicionaram por engano ou não quiseres aparecer como pessoa criadora, podes %{edit_chapter_link} para te removeres como pessoa criadora.
        remove_series: Caso a tua adição tenha sido por erro, ou não queiras aparecer como pessoa criadora, podes %{edit_series_link} para te retirares como pessoa criadora.
      intro_chapter: 'A pessoa utilizadora %{adding_user} listou o teu pseudónimo %{pseud} como cocriador no seguinte capítulo:'
      intro_series: 'A pessoa utilizadora %{adding_user} listou o teu pseudónimo %{pseud} como cocriador no na seguinte série:'
      text:
        creation: "%{title} (%{url}) por %{pseuds}"
        remove_chapter: 'Se te adicionaram por engano ou não quiseres aparecer como pessoa criadora, podes editar o capítulo para te removeres como pessoa criadora: %{url}'
        remove_series: 'Caso a tua adição tenha sido por erro, ou não queiras aparecer como pessoa criadora, podes editar a série para te retirares como pessoa criadora: %{url}'
    creatorship_notification_archivist:
      explanation: Como está a agir na sua capacidade como arquivista do Open Doors (Portas Abertas), esta pessoa está autorizada a adicionar-te sem um pedido, mesmo se tiveres a opção de co-criação desativada.
      html:
        creation: "%{creation_link} por %{pseud_links}"
        edit_chapter: editar o capítulo
        edit_series: editar a série
        edit_work: editar a obra
        remove_chapter: Se te adicionaram por engano ou não quiseres aparecer como pessoa criadora, podes %{edit_chapter_link} para te removeres como pessoa criadora.
        remove_series: Se te adicionaram por engano ou não quiseres aparecer como pessoa criadora, podes %{edit_series_link}para te removeres como pessoa criadora.
        remove_work: Se te adicionaram por engano ou não quiseres aparecer como pessoa criadora, podes %{edit_work_link} para te removeres como pessoa criadora.
      intro_chapter: 'A pessoa utilizadora %{archivist} adicionou o teu pseudónimo %{pseud} como pessoa co-criadora do seguinte capítulo:'
      intro_series: 'A pessoa utilizadora %{archivist} adicionou o teu pseudónimo %{pseud} como pessoa co-criadora da seguinte série:'
      intro_work: 'A pessoa utilizadora %{archivist} adicionou o teu pseudónimo %{pseud} como pessoa co-criadora da seguinte obra:'
      text:
        creation: "%{title} (%{url}) por %{pseuds}"
        remove_chapter: 'Se te adicionaram por engano ou não quiseres aparecer como pessoa criadora, podes editar o capítulo para para te removeres como pessoa criadora: %{url}'
        remove_series: 'Se te adicionaram por engano ou não quiseres aparecer como pessoa criadora, podes editar a série para te removeres como pessoa criadora: %{url}'
        remove_work: 'Se te adicionaram por engano ou não quiseres aparecer como pessoa criadora, podes editar a obra para te removeres como pessoa criadora: %{url}'
    creatorship_request:
      html:
        creation: "%{creation_link} por %{pseud_links}"
        instructions: Podes aceitar ou rejeitar este pedido na tua página de %{page_name}.
        page_name: Co-Creator Requests (Pedidos de Pessoa Co-Criadora)
      intro_chapter: 'A pessoa utilizadora %{inviting_user} convidou o teu pseudónimo %{pseud} para ser listado como pessoa co-criadora do seguinte capítulo:'
      intro_series: 'A pessoa utilizadora %{inviting_user} convidou o teu pseudónimo %{pseud} para ser listado como pessoa co-criadora da seguinte série:'
      intro_work: 'A pessoa utilizadora %{inviting_user} convidou o teu pseudónimo %{pseud} para ser listado como pessoa co-criadora da seguinte obra:'
      text:
        creation: "%{title} (%{url}) por %{pseuds}"
        instructions: 'Podes aceitar ou rejeitar este pedido na tua página de Co-Creator Requests (Pedidos de Pessoa Co-Criadora): %{url}'
    delete_work_notification:
      attachment: Segue em anexo uma cópia da tua obra para tua referência.
      deleted_other:
        html: A tua obra %{title} foi eliminada a pedido de %{pseud}.
        text: A tua obra "%{title}" foi eliminada a pedido de %{pseud}.
      deleted_yourself:
        html: A tua obra %{title} foi eliminada a teu pedido.
        text: A tua obra "%{title}" foi eliminada a teu pedido.
      questions:
        html: Se tiveres alguma pergunta, por favor %{support}.
        text: Se tiveres alguma questão, por favor %{support} (%{url}).
      subject: "[%{app_name}] A tua obra foi eliminada"
      support: contacta a equipa de Suporte
    invite_increase_notification:
      invitation_page_link_text: tua página de convites
      subject: "[%{app_name}] Novos Convites"
    invite_request_declined:
      main:
        one: Lamentamos informar que, de momento, não podemos satisfazer o teu pedido de um novo convite.
        other: Lamentamos informar que, de momento, não podemos satisfazer o teu pedido de %{count} novos convites.
      reason: 'O teu pedido foi:'
      subject: "[%{app_name}] Pedido de Código de Convite Adicional Recusado"
    recipient_notification:
      no_collection: Foi publicada uma obra presente para ti no AO3!
      subject:
        collection: "[%{app_name}][%{collection_title}] Uma obra presente para ti de %{collection_title}"
        no_collection: "[%{app_name}] Uma obra presente para ti"
  users:
    mailer:
      reset_password_instructions:
        subject: "[%{app_name}] Repõe a tua palavra-passe"

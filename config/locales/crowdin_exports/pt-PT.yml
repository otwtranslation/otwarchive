    claim_notification:
      access:
        contact_support: contacta a equipa de Suporte do AO3
        html: Dependendo do arquivo, as tuas obras podem ter sido importadas com acesso restrito a pessoas utilizadoras registadas (para não aparecerem em pesquisas Google). Se for este o caso, as obras só estarão acessíveis a pessoas utilizadoras com sessão iniciada a não ser que escolhas torná-las completamente visíveis. Se precisares de ajuda a desbloquear, orfanar ou apagar as tuas obras, por favor %{contact_support_link}.
        text: Dependendo do arquivo, as tuas obras podem ter sido importadas estando restritas a pessoas utilizadoras registadas (para não aparecerem em pesquisas Google). Se for este o caso, as obras só estarão acessíveis a pessoas utilizadoras com sessão iniciada a não ser que escolhas torná-las completamente visíveis. Se precisares de ajuda a desbloquear, orfanar ou apagar as tuas obras, por favor contacta a equipa de Suporte do AO3 em %{support_url}.
      email_tips: Se nos contactares, por favor adiciona os endereços de email @transformativeworks.org à tua lista de contactos seguros e verifica se a nossa resposta está nas tuas pastas de spam.
      introduction:
        ao3_name: Archive of Our Own – AO3 (O Nosso Próprio Arquivo)
        html: Estás a receber este e-mail porque tinhas obras num arquivo de obras de fãs que foi importado pelo %{open_doors_name_link} para o %{app_link}. Como este endereço de email está associado a uma pessoa registada no arquivo importado, as obras de fãs associadas (enumeradas abaixo) foram adicionadas automaticamente à tua conta do AO3.
        open_doors_name: Open Doors (Portas Abertas)
        text: 'Estás a receber este e-mail porque tinhas obras num arquivo de obras de fãs que foi importado pelo Open Doors (Portas Abertas) (%{open_doors_url}) para o Archive of Our Own – AO3 (O Nosso Próprio Arquivo): %{app_url}. Como este endereço de e-mail está associado a uma pessoa registada no arquivo importado, as obras de fãs associadas (enumeradas abaixo) foram adicionadas automaticamente à tua conta do AO3.'
      mistake:
        contact_open_doors: contacta o Portas Abertas
        html: Se isto for um engano e estas obras não forem tuas, por favor não as apagues! Por favor %{contact_open_doors_link} e nós trataremos do assunto.
        text: Se isto for um engano e estas obras não forem tuas, por favor não as apagues! Por favor contacta o Portas Abertas (%{open_doors_url}) e nós trataremos do assunto.
      more_info:
        ao3_news: Notícias do AO3
        contact_support: contacta a equipa de Suporte do AO3
        faq_page: página de Perguntas Frequentes (FAQs)
        html: Podes ler os anúncios de importações recentes de arquivos nas %{ao3_news_link} e encontrar informação adicional na %{faq_page_link} do Portas Abertas ou na %{tutorial_page_link}. Se tiveres questões que não estejam respondidas nas FAQs, nos tutoriais ou neste e-mail, por favor %{contact_support_link}.
        text: Podes ler os anúncios de mudanças de arquivos recentes no AO3 News (%{news_url}) e encontrar informação adicional na página de Perguntas Frequentes (FAQs) do Portas Abertas (%{open_doors_faq_url}) ou na página de tutoriais (%{open_doors_tutorial_url}). Se tiveres questões que não sejam respondidas nas FAQs, nos tutoriais ou neste e-mail, por favor contacta a equipa de Suporte em %{support_url}.
        tutorial_page: página dos tutoriais
      other_works:
        contact_open_doors: contacta o Portas Abertas
        html: Se tinhas outras obras no arquivo importado com um endereço de e-mail a que já não tens acesso, por favor %{contact_open_doors_link} com qualquer informação que possa ajudar a verificar a tua identidade.
        text: Se tinhas outras obras no arquivo importado com um e-mail a que já não tens acesso, por favor contacta o Portas Abertas com qualquer informação que possa ajudar a verificar a tua identidade.
      questions:
        contact_support: contacta a equipa de Suporte do AO3
        html: Para outras questões, por favor %{contact_support_link}.
        text: Para outras questões, por favor contacta a equipa de Suporte do AO3 em %{support_url}.
      redirects:
        html: Para preservar listas de recomendações e favoritos, os endereços web do arquivo importado podem redirecionar para a cópia importada destas obras por um período de tempo limitado (consulta o anúncio de importação do teu arquivo para teres a certeza). Se já fizeste upload de uma cópia destas obras e %{negation} usaste a opção importar de URL, irão existir duas cópias da mesma obra no AO3.
      subject: "[%{app_name}] Obras publicadas"
      update_redirect:
        contact_open_doors: contacta o Portas Abertas
        html: Se quiseres que o Portas Abertas atualize o redirecionamento para apontar para a tua obra pré-existente, por favor apaga a cópia importada, e %{contact_open_doors_link} com o nome da tua conta no AO3, o nome da tua conta no arquivo importado, e o título e o URL da obra para a qual gostarias que o redirecionamento apontasse. (Se gostarias de alterar o redirecionamento para várias obras, podes listá-las num único email.)
        text: Se quiseres que o Portas Abertas atualize o redirecionamento para apontar para a tua obra pré-existente, por favor apaga a cópia importada, e contacta o Portas Abertas em %{open_doors_url} com o nome da tua conta no AO3, o nome da tua conta no arquivo importado, e o título e o URL da obra para a qual gostarias que o redirecionamento apontasse. (Se gostarias de alterar o redirecionamento para várias obras, podes listá-las num único email.)
      work_info:
        html: "%{work_link} (%{fandom})"
        text:
          no_fandom: "- %{work_title} %{work_url}"
          with_fandom: "- %{work_title} %{work_url} (%{fandom})"
      works_by: 'Estas obras foram escritas sob o e-mail: %{email}'

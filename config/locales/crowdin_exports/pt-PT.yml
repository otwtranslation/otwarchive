      name_changed:
        html: The wrangler %{old_username} has changed their name to %{new_username}.
      subject: "[%{app_name}] Wrangler name change"
  user_mailer:
    abuse_report:
      copy:
        comment: Description of the content or issue
        intro: 'Here is a copy of your report for your reference:'
        summary: Terms of Service violation
        url: URL of the reported page
      report_received: The Policy & Abuse team has received your report, and our volunteers will investigate as soon as they can. Because our team is small and we receive thousands of reports each month, it may take some time for us to get to your report.
      resubmission: Please do not resubmit this report unless you have additional information that you did not include in your original report. Submitting multiple reports about the same issue may delay our response.
      subject: "[%{app_name}] Abuse - %{summary}"
      thank_you: Thank you for your patience.
    admin_deleted_work_notification:
      bye: Foi anexada uma cópia da obra para tua referência.
      contact_abuse: contacta o nosso Comité de Políticas e Abuso
      deleted:
        html: A tua obra %{title} foi eliminada do Arquivo por uma pessoa administradora do site.
        text: A tua obra "%{title}" foi eliminada do Arquivo por uma pessoa administradora do site.
      html:
        tos_violation: Se é possível que a tua obra tenha violado os Termos de Serviço do Arquivo, por favor %{contact_abuse_link}.
      import_project:
        html: Se a tua obra fazia parte de um projeto importado gerido pela nossa equipa do Open Doors (Portas Abertas), por favor %{opendoors_link} com as tuas questões.
        text: Se a tua obra fazia parte de um projeto importado gerido pela nossa equipa do Open Doors (Portas Abertas), por favor contacta o Portas Abertas (%{opendoors_link}) com quaisquer questões que tenhas.
      opendoors: contacta o Portas Abertas
      subject: "[%{app_name}] A tua obra foi eliminada por uma pessoa administradora"
      text:
        tos_violation: Se é possível que a tua obra tenha violado os Termos de Serviço do Arquivo, por favor contacta o nosso Comité de Políticas e Abuso (%{contact_abuse_url}).
    admin_hidden_work_notification:
      access: Ainda poderás aceder à obra oculta através do link indicado acima, mas esta não aparecerá na tua página de obras e não estará disponível para outras pessoas utilizadoras do AO3.
      check_email: Por favor verifica o teu email, incluindo a tua pasta de spam, pois a equipa de Políticas e Abuso pode já te ter contactado para explicar porque é que a tua obra foi ocultada.
      contact_abuse: contacta a equipa de Políticas e Abuso
      html:
        help: Se não sabes porque é que a tua obra foi ocultada e não recebeste mais nenhuma comunicação sobre o assunto, por favor %{contact_abuse_link} diretamente.
        hidden: A tua obra %{title} foi ocultada pela equipa de Políticas e Abuso e já não está acessível publicamente.
        tos_violation: Se a tua obra foi ocultada por infringir os %{tos_link} do AO3, será necessário que faças algo para corrigir a infração. Caso não tomes as medidas necessárias para a tua obra estar em conformidade com os Termos de Serviço, a tua obra poderá ser eliminada do AO3.
      subject: "[%{app_name}] A tua obra foi ocultada pela equipa de Políticas e Abuso"
      text:
        help: 'Se não sabes porque é que a tua obra foi ocultada e não recebeste mais nenhuma comunicação sobre o assunto, por favor contacta a equipa de abuso diretamente: %{contact_abuse_url}.'
        hidden: A tua obra "%{title}" (%{work_url}) foi ocultada pela equipa de Políticas e Abuso e já não está acessível publicamente.
        tos_violation: Se a tua obra foi ocultada por infringir os Termos de Serviço (%{tos_url}) do AO3, será necessário que faças algo para corrigir a infração. Caso não tomes as medidas necessárias para a tua obra estar em conformidade com os Termos de Serviço, a tua obra poderá ser eliminada do AO3.
      tos: Termos de Serviço
    anonymous_or_unrevealed_notification:
      anonymous_info: Obras anónimas são incluídas em listas de tags, mas não na tua página de obras. Na obra, o teu nome de utilizador será substituído por "Anonymous" (Anónimo).
      anonymous_unrevealed_info: As pessoas responsáveis pela coleção podem revelar a tua obra mais tarde mas mantê-la anónima. As pessoas que te subscrevem não serão notificadas sobre esta alteração. Uma vez revelada, a tua obra será incluída nas listas de tags, mas não na tua página de obras. Na obra, o teu nome de utilizador será substituído por "Anonymous" (Anónimo).
      changed_status:
        anonymous:
          html: As pessoas responsáveis por manter a coleção %{collection_link} alteraram o estado da tua obra %{work_link} para "anónima".
          text: As pessoas responsáveis por manter a coleção "%{collection_title}" (%{collection_url}) alteraram o estado da tua obra "%{work_title}" (%{work_url}) para "anónima".
        anonymous_unrevealed:
          html: As pessoas responsáveis por manter a coleção %{collection_link} alteraram o estado da tua obra %{work_link} para "anónima" e "não revelada".
          text: As pessoas responsáveis por manter a coleção "%{collection_title}" (%{collection_url}) alteraram o estado da tua obra "%{work_title}" (%{work_url}) para "anónima" e "não revelada".
        unrevealed:
          html: As pessoas responsáveis por manter a coleção %{collection_link} alteraram o estado da tua obra %{work_link} para "não revelada".
          text: As pessoas responsáveis por manter a coleção "%{collection_title}" (%{collection_url}) alteraram o estado da tua obra "%{work_title}" (%{work_url}) para "não revelada".
      collection_items_link_text: página de Approved Collection Items (Itens de Coleção Aprovados)
      do_not_want:
        anonymous:
          html: Se não queres que a tua obra seja anónima, por favor visita a tua %{collection_items_link} para a remover desta coleção.
          text: 'Se não queres que a tua obra seja anónima, por favor visita a tua página de Approved Collection Items (Itens de Coleção Aprovados) para a remover desta coleção: %{collection_items_url}'
        anonymous_unrevealed:
          html: Se não queres que a tua obra seja anónima e fique inacessível até ser revelada, por favor visita a tua %{collection_items_link} para a remover desta coleção.
          text: 'Se não queres que a tua obra seja anónima e fique inacessível até ser revelada, por favor visita a tua página de Approved Collection Items (Itens de Coleção Aprovados) para a remover desta coleção: %{collection_items_url}'
        unrevealed:
          html: Se não queres que a tua obra fique inacessível até ser revelada, por favor visita a tua %{collection_items_link} para a remover desta coleção.
          text: 'Se não queres que a tua obra fique inacessível até ser revelada, por favor visita a tua página de Approved Collection Items (Itens de Coleção Aprovados) para a remover desta coleção: %{collection_items_url}'
      faq_link_text: FAQs sobre Coleções
      more_info:
        html: Para mais informações, visita as nossas %{faq_link}.
        text: 'Para mais informações, visita as nossas FAQs sobre Coleções: %{faq_url}.'
      subject:
        anonymous: "[%{app_name}] A tua obra foi tornada anónima"
        anonymous_unrevealed: "[%{app_name}] A tua obra foi tornada anónima e não revelada"
        unrevealed: "[%{app_name}] A tua obra foi tornada numa obra não revelada"
      unrevealed_info: Obras não reveladas não são incluídas nas listas de tags ou na tua página de obras. Qualquer pessoa que siga uma ligação para a obra vai receber um aviso a indicar que, atualmente, não está revelada e que não poderá aceder ao seu conteúdo.
    archivist_added_to_collection_notification:
      approved_collection_items_page: página Approved Collection Items (Itens de Coleção Aprovados)
      archivist_notice: Como as pessoas responsáveis pela coleção estão a agir na sua função oficial como arquivista do Open Doors (Portas Abertas), podem adicionar a tua obra a esta coleção, mesmo que tenhas desativado a opção de convites para coleções. As pessoas arquivistas só irão adicionar uma obra a uma coleção se a obra estava alojada num arquivo importado.

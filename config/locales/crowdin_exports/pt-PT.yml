        html: Se quiseres remover a tua obra desta coleção, por favor visita a tua %{approved_items_link}.
        text: 'Se quiseres remover a tua obra desta coleção, por favor visita a tua página Approved Collection Items (Itens de Coleção Aprovados): %{approved_items_url}.'

      update_redirect:
        contact_open_doors: skontaktuj się z Drzwiami Otwartymi
        html: Jeśli wolisz, aby Drzwi Otwarte zaktualizowały przekierowanie, tak aby odnosiło się do Twojej już istniejącej pracy, prosimy usuń zaimportowaną kopię i %{contact_open_doors_link}, podając swoją nazwę konta AO3, nazwę konta z importowanego archiwum oraz tytuł i URL pracy, na którą chcesz przekierowywać. (Jeśli masz wiele prac, dla których chcesz zmienić przekierowanie, możesz zawrzeć ich listę w jednej wiadomości.)

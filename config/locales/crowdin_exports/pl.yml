        html: Otrzymujesz ten email, ponieważ Twoje prace znajdowały się w archiwum twórczości fanowskiej, które zostało zaimportowane przez %{open_doors_name_link} do %{app_link}. Ponieważ ten adres email jest połączony z tym zarejestrowanym na zaimportowanym archiwum, powiązane prace (wymienione poniżej) zostały automatycznie dodane do Twojego konta AO3.
        open_doors_name: Open Doors (Drzwi Otwarte)
        text: 'Otrzymujesz ten email, ponieważ Twoje prace znajdowały się w archiwum twórczości fanowskiej, które zostało zaimportowane przez Open Doors (Drzwi Otwarte) (%{open_doors_url}) do Archive of Our Own – AO3 (Naszego Własnego Archiwum): %{app_url}. Ponieważ ten adres email jest połączony z tym zarejestrowanym na zaimportowanym archiwum, powiązane prace (wymienione poniżej) zostały automatycznie dodane do Twojego konta AO3.'

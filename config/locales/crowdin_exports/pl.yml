        text: Możesz zapoznać się z ostatnimi przenosinami archiwów na AO3 News (%{news_url}) i znaleźć więcej informacji na stronie FAQ (%{open_doors_faq_url}) lub na stronie z samouczkiem (%{open_doors_tutorial_url}) Drzwi Otwartych. Jeśli masz pytania, które nie zostały pokryte przez FAQ, samouczki, lub ten email, prosimy skontaktuj się ze Wsparciem przez %{support_url}.

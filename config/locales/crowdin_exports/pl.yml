      access:
        contact_support: skontaktuj się ze Wsparciem AO3
        html: W zależności od archiwum, Twoje prace mogły zostać zaimportowane jako dostępne wyłącznie dla zarejestrowanych użytkowników (aby nie pojawiały się w wynikach wyszukiwania Google). W takiej sytuacji, prace będą dostępne tylko dla zalogowanych użytkowników, chyba że postanowisz udostępnić je dla wszystkich. Aby otrzymać pomoc z odblokowaniem, osieroceniem, lub usunięciem swoim prac, prosimy %{contact_support_link}.
        text: W zależności od archiwum, Twoje prace mogły zostać zaimportowane jako dostępne wyłącznie dla zarejestrowanych użytkowników (aby nie pojawiały się w wynikach wyszukiwania Google'a). W takiej sytuacji, prace będą dostępne tylko dla zalogowanych użytkowników, chyba że postanowisz udostępnić je dla wszystkich. Aby otrzymać pomoc z odblokowaniem, osieroceniem, lub usunięciem swoim prac, prosimy skontaktuj się ze Wsparciem AO3 przez %{support_url}.
      email_tips: Jeśli kontaktujesz się z nami, prosimy dodaj adresy email z domeny @transformativeworks.org do zaufanych kontaktów i sprawdzaj czy naszych odpowiedzi nie ma w Twoim folderze spam.
      introduction:

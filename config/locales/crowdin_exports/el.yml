      subject: "[%{app_name}] Το έργο σας έχει διαγραφεί από έναν διαχειριστή"
      text:
        tos_violation: Αν είναι πιθανό το έργο σας να παραβίασε τους Όρους Παροχής Υπηρεσιών του AO3, παρακαλούμε επικοινωνήστε με την Επιτροπή Πολιτικής & Κατάχρησης (%{contact_abuse_url}).
    admin_hidden_work_notification:
      access: Όσο το έργο σας παραμένει κρυφό, θα εξακολουθείτε να έχετε πρόσβαση σε αυτό μέσω του παραπάνω συνδέσμου, αλλά δε θα εμφανίζεται στη σελίδα με τη λίστα των έργων σας και δε θα είναι διαθέσιμο στους άλλους χρήστες του AO3.
      check_email: Παρακαλούμε ελέγξτε την ηλεκτρονική σας αλληλογραφία (email), συμπεριλαμβανομένου και του φακέλου ανεπιθύμητης αλληλογραφίας (spam), καθώς μπορεί η ομάδα Πολιτικής & Κατάχρησης να έχει ήδη επικοινωνήσει μαζί σας εξηγώντας γιατί το έργο σας κατέστηι κρυφό.
      contact_abuse: επικοινωνήστε απευθείας με την Επιτροπή Πολιτικής & Κατάχρησης
      html:
        help: Αν δε γνωρίζετε με βεβαιότητα γιατί το έργο σας κατέστη κρυφό και δεν έχετε λάβει επιπλέον μηνύματα σχετικά με αυτό το θέμα, παρακαλούμε %{contact_abuse_link}.
        hidden: Το έργο σας με τίτλο %{title} έχει καταστεί κρυφό από την ομάδα Πολιτικής & Κατάχρησης και δεν είναι πλέον δημόσια προσβάσιμο.
        tos_violation: Αν το έργο σας κατέστη κρυφό επειδή παραβίαζε τους %{tos_link} του AO3, θα πρέπει να προβείτε σε ενέργειες προκειμένου να διορθώσετε την παραβίαση. Μη συμμόρφωση του έργου σας με τους Όρους Παροχής Υπηρεσιών μπορεί να οδηγήσει στη διαγραφή του έργου σας από το AO3.
      subject: "[%{app_name}] Το έργο σας έχει καταστεί κρυφό από την ομάδα Πολιτικής & Κατάχρησης"
      text:
        help: 'Αν δε γνωρίζετε με βεβαιότητα γιατί το έργο σας κατέστη κρυφό και δεν έχετε λάβει επιπλέον μηνύματα σχετικά με αυτό το θέμα, παρακαλούμε επικοινωνήστε απευθείας με την Επιτροπή Πολιτικής & Κατάχρησης: %{contact_abuse_url}.'
        hidden: Το έργο σας με τίτλο "%{title}" (%{work_url}) έχει καταστεί κρυφό από την ομάδα Πολιτικής & Κατάχρησης και δεν είναι πλέον δημόσια προσβάσιμο.
        tos_violation: Αν το έργο σας κατέστη κρυφό επειδή παραβίαζε τους Όρους Παροχής Υπηρεσιών του AO3 (%{tos_url}), θα πρέπει να προβείτε σε ενέργειες προκειμένου να διορθώσετε την παραβίαση. Μη συμμόρφωση του έργου σας με τους Όρους Παροχής Υπηρεσιών μπορεί να οδηγήσει στη διαγραφή του έργου σας από το AO3.
      tos: Όροι Παροχής Υπηρεσιών
    anonymous_or_unrevealed_notification:
      anonymous_info: Τα ανώνυμα έργα συμπεριλαμβάνονται σε λίστες ετικετών, αλλά όχι στη σελίδα των έργων σας. Στο συγκεκριμένο έργο, το όνομα χρήστη σας θα αντικατασταθεί με το "Anonymous" (Ανώνυμος).
      anonymous_unrevealed_info: Οι διαχειριστές της συλλογής μπορεί αργότερα να καταστήσουν το έργο σας φανερό, αλλά να το αφήσουν ανώνυμο. Τα άτομα με συνδρομές στον λογαριασμό σας θα ειδοποιηθούν για αυτήν την αλλαγή. Μόλις γίνει φανερό, το έργο σας θα συμπεριλαμβάνεται στις λίστες ετικετών, αλλά όχι στη σελίδα των έργων σας. Στο έργο σας, το όνομα χρήστη σας θα αντικατασταθεί με το "Anonymous" (Ανώνυμος).
      changed_status:
        anonymous:
          html: Οι διαχειριστές της συλλογής %{collection_link} έχουν αλλάξει την κατάσταση του έργου σας %{work_link} σε "ανώνυμο".
          text: Οι διαχειριστές της συλλογής "%{collection_title}" (%{collection_url}) άλλαξαν την κατάσταση του έργου σας "%{work_title}" (%{work_url}) σε ανώνυμο.
        anonymous_unrevealed:
          html: Οι διαχειριστές της συλλογής %{collection_link} άλλαξαν την κατάσταση του έργου σας %{work_link} σε "ανώνυμο και κρυμμένο".
          text: Οι διαχειριστές της συλλογής "%{collection_title}" (%{collection_url}) άλλαξαν την κατάσταση του έργου σας "%{work_title}" (%{work_url}) σε ανώνυμο και κρυφό.
        unrevealed:
          html: Οι διαχειριστές της συλλογής %{collection_link} άλλαξαν την κατάσταση του έργου σας %{work_link} σε "κρυμμένο".
          text: Οι διαχειριστές της συλλογής "%{collection_title}" (%{collection_url}) άλλαξαν την κατάσταση του έργου σας "%{work_title}" (%{work_url}) σε κρυφό.
      collection_items_link_text: σελίδα Approved Collection Items (Εγκεκριμένα Αντικείμενα Συλλογών)
      do_not_want:
        anonymous:
          html: Αν δε θέλετε το έργο σας να είναι ανώνυμο, παρακαλούμε επισκεφθείτε τη %{collection_items_link} για να το αφαιρέσετε από αυτήν τη συλλογή.
          text: 'Αν δε θέλετε το έργο σας να είναι ανώνυμο, παρακαλούμε επισκεφθείτε τη σελίδα Approved Collection Items (Εγκεκριμένα Αντικείμενα Συλλογών) για να το αφαιρέσετε από αυτήν τη συλλογή: %{collection_items_url}'
        anonymous_unrevealed:
          html: Αν δε θέλετε το έργο σας να είναι ανώνυμο και κρυμμένο, παρακαλούμε επισκεφθείτε τη %{collection_items_link} για να το αφαιρέσετε από αυτήν τη συλλογή.
          text: 'Αν δε θέλετε το έργο σας να είναι ανώνυμο και κρυμμένο, παρακαλούμε επισκεφθείτε τη σελίδα Approved Collection Items (Εγκεκριμένα Αντικείμενα Συλλογών) για να το αφαιρέσετε από αυτήν τη συλλογή: %{collection_items_url}'
        unrevealed:
          html: Αν δε θέλετε το έργο σας να είναι κρυμμένο, παρακαλούμε επισκεφθείτε τη %{collection_items_link} για να το αφαιρέσετε από αυτήν τη συλλογή.
          text: 'Αν δε θέλετε το έργο σας να είναι κρυμμένο, παρακαλούμε επισκεφθείτε τη σελίδα Approved Collection Items (Εγκεκριμένα Αντικείμενα Συλλογών) για να το αφαιρέσετε από αυτήν τη συλλογή: %{collection_items_url}'
      faq_link_text: Συχνές Ερωτήσεις για τις Συλλογές
      more_info:
        html: Για περισσότερες πληροφορίες, επισκεφθείτε τις %{faq_link}.
        text: 'Για περισσότερες πληροφορίες, επισκεφθείτε τις Συχνές Ερωτήσεις για τις Συλλογές: %{faq_url}'
      subject:
        anonymous: "[%{app_name}] Το έργο σας κατέστη ανώνυμο."
        anonymous_unrevealed: "[%{app_name}] Το έργο σας κατέστη ανώνυμο και κρυμμένο"
        unrevealed: "[%{app_name}] Το έργο σας κατέστη κρυμμένο"
      unrevealed_info: Τα κρυμμένα έργα δε συμπεριλαμβάνονται στις λίστες ετικετών ή στη σελίδα των έργων σας. Οποιοσδήποτε ακολουθήσει έναν σύνδεσμο για το έργο, θα λάβει ειδοποίηση πως είναι επί του παρόντος κρυμμένο και δεν είναι δυνατή η πρόσβασή του.
    archivist_added_to_collection_notification:
      approved_collection_items_page: Σελίδα Approved Collection Items (Έργα Εγκεκριμένα για Συλλογές)
      archivist_notice: Καθώς οι προγραμματιστές συλλογών δρουν ως επίσημοι αρχειοφύλακες του Open Doors (Ανοιχτές Πόρτες), τους επιτρέπεται να προσθέσουν το έργο σας σε αυτή τη συλλογή, ακόμα κι αν έχετε τις προσκλήσεις σε συλλογές απενεργοποιημένες. Οι αρχειοφύλακες θα προσθέσουν ένα έργο σε μια συλλογή μόνο [το έργο] φιλοξενούνταν σε ένα εισαγόμενο αρχείο.
      removal_instructions:
        html: Αν θέλετε να αφαιρέσετε το έργο σας από αυτή τη συλλογή, παρακαλούμε επισκεφθείτε τον σύνδεσμο %{approved_items_link}.
        text: 'Αν θέλετε να αφαιρέσετε το έργο σας από αυτή τη συλλογή, παρακαλούμε επισκεφθείτε τη σελίδα σας Approved Collection Items (Έργα Εγκεκριμένα για Συλλογές) %{approved_items_url}'
      subject: "[%{app_name}][%{collection_title}] Ένας αρχειοφύλακας του Open Doors (Ανοιχτές Πόρτες) πρόσθεσε το έργο σας σε μια συλλογή"
      work_added:
        html: Οι προγραμματιστές της συλλογής %{collection_link} πρόσθεσαν το έργο σας %{work_link} στη συλλογή τους!
        text: Οι προγραμματιστές της συλλογής "%{collection_title}" (%{collection_url}) πρόσθεσαν το έργο σας "%{work_title}" (%{work_url}) στη συλλογή τους!
    challenge_assignment_notification:
      any: Οτιδήποτε
      assignment:
        html: Σας έχει ανατεθεί το ακόλουθο αίτημα στην πρόκληση %{link} στο ΑΟ3!
      description: 'Περιγραφή:'
      due: 'Η ανάθεση πρέπει να υποβληθεί ως τις:'
      html:
        footer: Λαμβάνετε αυτό το μήνυμα γιατί δηλώσατε συμμετοχή στην πρόκληση %{title}. Για περισσότερες πληροφορίες σχετικά με αυτήν την πρόκληση και τα στοιχεία επικοινωνίας των διαχειριστών της, παρακαλούμε μεταβείτε στο %{footer_link}.
        footer_link: σελίδα προφίλ της πρόκλησης
        look_up: Μπορείτε να ανατρέξετε σε αυτήν την ανάθεση στη %{link}.
        look_up_link: σελίδα με τις Assignments (Αναθέσεις) σας
      optional_tags: 'Προαιρετικές Ετικέτες:'
      prompt_url: 'URL προτροπής:'
      prompts: 'Προτροπές:'
      recipient: 'Παραλήπτης:'
      recipient_missing: 'Κενό: επικοινωνήστε με έναν διαχειριστή για βοήθεια!'
      subject: "[%{app_name}][%{collection_title}] Η Ανάθεσή σας!"
      text:
        assignment: Σας έχει ανατεθεί το ακόλουθο αίτημα στην πρόκληση "%{collection_title}" (%{collection_url}) στο AO3!
        footer: Λαμβάνετε αυτό το μήνυμα γιατί δηλώσατε συμμετοχή στην πρόκληση %{title} (%{url}). Για περισσότερες πληροφορίες σχετικά με αυτήν την πρόκληση και τα στοιχεία επικοινωνίας των διαχειριστών της, παρακαλούμε μεταβείτε στο %{profile_url}.
        look_up: Μπορείτε να βρείτε πληροφορίες για αυτήν την ανάθεση στη σελίδα των Assignments (Αναθέσεών) σας στο %{link}.
    change_email:
      changed:
        html: "%{login}, the email associated with your account has been changed to %{email}"
        text: "%{login}, the email associated with your account has been changed to %{email}"
      subject: "Αίτημα αλλαγής διεύθυνσης email"
    claim_notification:
      access:
        contact_support: Επικοινωνία με την Επιτροπή Υποστήριξης του ΑΟ3
        html: Ανάλογα με το αρχείο, τα έργα σας ενδέχεται να έχουν εισαχθεί ως περιορισμένα μόνο σε εγγεγραμμένους χρήστες (ώστε να τα αποκρύψουν από αναζητήσεις στο Google). Αν ισχύει αυτό, στα έργα θα έχουν πρόσβαση μόνο συνδεδεμένοι χρήστες εκτός αν επιλέξετε να τα κάνετε ορατά σε όλους. Για βοήθεια με το ξεκλείδωμα, την αποποίηση, ή τη διαγραφή των έργων σας, παρακαλούμε επικοινωνήστε με το %{contact_support_link}.
        text: Ανάλογα με το αρχείο, τα έργα σας ενδέχεται να έχουν εισαχθεί ως περιορισμένα μόνο σε εγγεγραμμένους χρήστες (ώστε να τα αποκρύψουν από αναζητήσεις στο Google). Αν ισχύει αυτό, στα έργα θα έχουν πρόσβαση μόνο συνδεδεμένοι χρήστες εκτός αν επιλέξετε να τα κάνετε ορατά σε όλους. Για βοήθεια με το ξεκλείδωμα, την αποποίηση, ή τη διαγραφή των έργων σας, παρακαλούμε επικοινωνήστε με την Επιτροπή Υποστήριξης στο %{support_url}.
      email_tips: Αν επικοινωνείτε μαζί μας, παρακαλούμε να προσθέσετε τις ηλεκτρονικές διευθύνσεις από το @transformativeworks.org στη λίστα των ασφαλών επαφών σας και ελέγξτε τους φακέλους ανεπιθύμητων μηνυμάτων για την απάντησή μας.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Το Αρχείο Μας)
        html: Λαμβάνετε αυτό το e-mail επειδή είχατε έργα σε ένα αρχείο έργων θαυμαστών το οποίο εισήγαγαν οι %{open_doors_name_link} στο %{app_link}. Επειδή η ηλεκτρονική αυτή διεύθυνση συνδέεται με μιά διεύθυνση καταγεγραμμένη στο εισαγόμενο αρχείο, τα συσχετισμένα έργα θαυμαστών (αναγράφονται παρακάτω) έχουν προστεθεί αυτόματα στον λογαριασμό σας στο AO3.
        open_doors_name: Open Doors (Ανοιχτές Πόρτες)
        text: 'Λαμβάνετε αυτό το e-mail επειδή είχατε έργα σε ένα αρχείο έργων θαυμαστών το οποίο εισήγαγαν οι Open Doors (Ανοιχτές Πόρτες) (%{open_doors_url}) στο Archive of Our Own – AO3 (Το Αρχείο Μας): %{app_url}. Επειδή η ηλεκτρονική αυτή διεύθυνση συνδέεται με μιά διεύθυνση καταγεγραμμένη στο εισαγόμενο αρχείο, τα συσχετισμένα έργα θαυμαστών (αναγράφονται παρακάτω) έχουν προστεθεί αυτόματα στον λογαριασμό σας στο AO3.'
      mistake:
        contact_open_doors: Επικοινωνία με το Open Doors
        html: Αν αυτό είναι σφάλμα και αυτά δεν είναι τα έργα σας, παρακαλούμε μην τα διαγράψετε! Παρακαλούμε απλώς επικοινωνήστε με το %{contact_open_doors_link} και θα το διευθετήσουμε.
        text: Αν αυτό είναι σφάλμα και αυτά δεν είναι τα έργα σας, παρακαλούμε μην τα διαγράψετε! Παρακαλούμε απλώς επικοινωνήστε με το %{open_doors_url} και θα το διευθετήσουμε.
      more_info:
        ao3_news: Νέα του ΑΟ3

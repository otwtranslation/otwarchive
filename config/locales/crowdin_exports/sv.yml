        text: Om du vill att Öppna dörrar uppdaterar omdirigeringen till ditt redan existerande verk, vänligen radera kopian och kontakta Öppna dörrar på %{open_doors_url} med ditt användarnamn på AO3, ditt användarnamn på det importerade arkivet, samt titel och länk till verket du vill att omdirigeringen ska leda till. (Om du har flera verk du skulle vilja ändra omdirigeringen på, kan du skriva alla i samma mail.)

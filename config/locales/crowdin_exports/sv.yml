        html: Du får det här mailet eftersom du hade verk på ett arkiv för verk av fans som har importerats av %{open_doors_name_link} till %{app_link}. Eftersom den här e-postadressen är kopplad till en användare på det importerade arkivet så kommer de tillhörande verken (listade nedan) automatiskt läggas till på ditt konto på AO3.
        open_doors_name: Open Doors (Öppna dörrar)
        text: 'Du får det här mailet eftersom du hade verk på ett arkiv för verk av fans som har importerats av Open Doors (Öppna dörrar) (%{open_doors_url}) till Archive of Our Own – AO3 (Vårt eget arkiv): %{app_url}. Eftersom den här epostadressen är kopplat till en användare på det importerade arkivet så kommer de tillhörande verken (listade nedan) automatiskt läggas till på ditt konto på AO3.'
      mistake:
        contact_open_doors: kontakta Öppna dörrar
        html: Om detta är ett misstag och verken inte är dina, vänligen radera dem inte! Var snäll och %{contact_open_doors_link} så löser vi det.
        text: Om detta är ett misstag och verken inte är dina, vänligen radera dem inte! Var snäll och kontakta Öppna dörrar (%{open_doors_url}) så löser vi det.

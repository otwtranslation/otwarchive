        text: Du kan läsa tillkännagivanden om nya arkivöverföringar på AO3 Nyheter (%{news_url}), och du hittar ytterligare information på Öppna dörrars sida för Vanliga frågor (%{open_doors_faq_url}) eller sidan för guider (%{open_doors_tutorial_url}). För frågor som inte finns med i Vanliga frågor, guider eller detta mail, vänligen kontakta Support på %{support_url}.

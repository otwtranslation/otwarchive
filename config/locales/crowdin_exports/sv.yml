        html: Beroende på arkivet kan det vara så att dina verk har importerats och begränsats till endast registrerade användare (för att gömma dem från Googles sökresultat). Om det är så, kommer verken bara finnas tillgängliga för inloggade användare, såvida du inte väljer att göra dem synliga för alla. För hjälp med att låsa upp, anonymisera eller radera dina verk, vänligen %{contact_support_link}.
        text: Beroende på arkivet kan det vara så att dina verk har importerats och begränsats till endast registrerade användare (för att gömma dem från Googles sökresultat). Om det är så kommer verken bara finnas tillgängliga för inloggade användare, såvida du inte väljer att göra dem synliga för alla. För hjälp med att låsa upp, anonymisera eller radera dina verk, vänligen kontakta AO3 Support på %{support_url}.
      email_tips: Om du kontaktar oss, var snäll och lägg till mailadresser från @transformativeworks.org på din lista med säkra kontakter och håll koll på din skräppost för att säkerställa att du ser vårt svar.

        open_doors_name: Open Doors (Otevřené dveře)
        text: 'Tento e-mail vám zasíláme, protože jste měli v archivu fanouškovských děl práce, které byly v rámci projektu Open Doors (Otevřené dveře) (%{open_doors_url}) naimportovány do Archive of Our Own – AO3 (Našeho vlastního archivu): %{app_url}. Vzhledem k tomu, že tato e-mailová adresa je spojena s adresou zaregistrovanou v importovaném archivu, byla související (níže uvedená) fanouškovská díla automaticky přiřazena k vašemu účtu na AO3.'

        html: V závislosti na typu archivu mohou být vaše importované práce dostupné pouze registrovaným uživatelům (aby se nedostaly do vyhledávání Google). Pokud se nerozhodnete je zpřístupnit všem uživatelům, budou přístupné pouze přihlášeným uživatelům. Pokud potřebujete pomoct s odemknutím, opuštěním nebo odstraněním vašich prací, %{contact_support_link}.
        text: 'V závislosti na typu archivu mohou být vaše importované práce dostupné pouze registrovaným uživatelům (aby se nedostaly do vyhledávání Google). Pokud se nerozhodnete je zpřístupnit všem uživatelům, budou přístupné pouze přihlášeným uživatelům. Pokud potřebujete pomoct s odemknutím, opuštěním nebo odstraněním vašich prací, kontaktujte Podporu AO3: %{support_url}.'

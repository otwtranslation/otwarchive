        contact_support: Podporu AO3
        faq_page: Často kladené dotazy (FAQ)
        html: Oznámení o nedávných přesunech v archivu si můžete přečíst na stránkách %{ao3_news_link} a dodatečné informace najdete na stránkách Open Doors %{faq_page_link} nebo %{tutorial_page_link}. Jakékoli otázky, na které nenaleznete odpověď v často kladených dotazech, návodech nebo v tomto e-mailu, prosím směřujte na %{contact_support_link}.
        text: 'Oznámení o nedávných přesunech archivu si můžete přečíst na stránkách Novinek AO3 (%{news_url}) a dodatečné informace najdete na stránkách Open Doors s často kladenými dotazy (%{open_doors_faq_url}) nebo s návody (%{open_doors_tutorial_url}). Jakékoli otázky, na které nenaleznete odpověď v často kladených dotazech, návodech nebo v tomto e-mailu, prosím směřujte na Podporu AO3: %{support_url}.'

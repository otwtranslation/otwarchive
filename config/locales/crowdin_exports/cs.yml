        contact_open_doors: kontaktovat projekt Open Doors
        html: Máte-li pocit, že vám tento e-mail by zaslán omylem a nejedná se o vaše práce, prosím nemažte je! Stačí %{contact_open_doors_link} a my to vyřešíme.
        text: Máte-li pocit, že vám tento e-mail by zaslán omylem a nejedná se o vaše práce, prosím nemažte je! Stačí kontaktovat Open Doors (%{open_doors_url}) a my to vyřešíme.

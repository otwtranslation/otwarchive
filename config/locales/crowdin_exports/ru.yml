        html: Вы получили это письмо, потому что ваши работы были в архиве, который был перенесен %{open_doors_name_link} в %{app_link}. Поскольку этот адрес электронной почты связан с тем, который использовался в переносимом архиве, соответствующие фан-работы (перечисленные ниже) были автоматически добавлены в вашу учетную запись на AO3.
        open_doors_name: Open Doors (Открытые двери)
        text: 'Вы получили это письмо, потому что у вас были произведения в архиве фан-работ, которые были перенесены Open Doors (Открытыми дверями) (%{open_doors_url}) в Archive of Our Own – AO3 (Наш архив): %{app_url}. Поскольку этот адрес электронной почты связан с тем, который зарегистрирован в переносимом архиве, соответствующие фан-работы (перечисленные ниже) были автоматически добавлены в вашу учетную запись AO3.'

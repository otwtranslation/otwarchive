        text: В зависимости от архива ваши работы могли быть импортированы только для зарегистрированных пользователей (чтобы они не попадали в поиск Google). В этом случае работы будут доступны только зарегистрированным пользователям, если вы не решите сделать их полностью видимыми. Для помощи в разблокировке, отказе или удалении ваших работ, пожалуйста, свяжитесь с Поддержкой АО3 по ссылке %{support_url}.

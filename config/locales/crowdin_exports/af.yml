        remove_series: 'As jy verkeerdelik bygevoeg is of nie as ''n skepper gelys wil word nie, kan jy die reeks redigeer om jouself as skepper te verwyder: %{url}'
        remove_work: 'As jy verkeerdelik bygevoeg is of nie as ''n skepper gelys wil word nie, kan jy die werk redigeer om jouself as skepper te verwyder: %{url}'

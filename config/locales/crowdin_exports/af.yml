      contact_abuse: kontak die Beleidsmisbruik-komitee
      html:
        help: Indien jy onseker is waarom jou werk versteek is, en jy geen verdere kommunikasie oor hierdie saak ontvang het nie, %{contact_abuse_link}.
        hidden: Jou werk %{title} is deur die Beleidsmisbruik-span versteek en is nie meer in die openbaar toeganklik nie.
        tos_violation: Indien jou werk versteek is as gevolg van 'n oortreding van die AO3 se %{tos_link}, sal jy stappe moet volg om die oortreding reg te stel. Indien jy nie jou werk opdateer om aan die Diensvoorwaardes te voldoen nie, kan jou werk van die AO3 verwyder word.
      subject: "[%{app_name}] Jou werk is deur die Beleidsmisbruik-span versteek"
      text:

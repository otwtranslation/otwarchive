      access: Alhoewel jou werk versteek is, sal jy steeds toegang daartoe hê deur die skakel hierbo, maar dit sal nie op jou werkebladsy gelys word nie, en dit sal nie beskikbaar wees vir ander gebruikers van die AO3 nie.

        hidden: Jou werk "%{title}" (%{work_url}) is deur die Beleidsmisbruik-span versteek en is nie meer publiek toeganklik nie.
        tos_violation: Indien jou werk versteek is as gevolg van 'n oortreding van die AO3 se Diensvoorwaardes (%{tos_url}), sal jy stappe moet neem om die oortreding reg te stel. Indien jy nie jou werk opdateer om aan die Diensvoorwaardes te voldoen nie, kan jou werk van die AO3 verwyder word.

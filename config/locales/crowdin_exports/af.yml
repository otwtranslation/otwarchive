---
af:
  mailer:
    general:
      creation:
        title_with_chapter_number: Hoofstuk %{position} van %{title}
  user_mailer:
    admin_hidden_work_notification:
      access: Alhoewel jou werk versteek is, sal jy steeds toegang daartoe hê deur die skakel hierbo, maar dit sal nie op jou werkebladsy gelys word nie, en dit sal nie beskikbaar wees vir ander gebruikers van die AO3 nie.
      check_email: Gaan asseblief jou e-pos na, insluitend jou strooiposvouer, aangesien die Beleid- en Misbruikspan jou moontlik reeds gekontak het om te verduidelik hoekom jou werk versteek is.
      contact_abuse: kontak die Beleidsmisbruik-komitee
      html:
        help: Indien jy onseker is waarom jou werk versteek is, en jy geen verdere kommunikasie oor hierdie saak ontvang het nie, %{contact_abuse_link}.
        hidden: Jou werk %{title} is deur die Beleidsmisbruik-span versteek en is nie meer in die openbaar toeganklik nie.
        tos_violation: Indien jou werk versteek is as gevolg van 'n oortreding van die AO3 se %{tos_link}, sal jy stappe moet volg om die oortreding reg te stel. Indien jy nie jou werk opdateer om aan die Diensvoorwaardes te voldoen nie, kan jou werk van die AO3 verwyder word.
      subject: "[%{app_name}] Jou werk is deur die Beleidsmisbruik-span versteek"
      text:
        help: 'Indien jy onseker is waarom jou werk versteek is, en jy geen verdere kommunikasie oor hierdie saak ontvang het nie, kontak asseblief die Beleidsmisbruik-komitee: %{contact_abuse_url}.'
        hidden: Jou werk "%{title}" (%{work_url}) is deur die Beleidsmisbruik-span versteek en is nie meer publiek toeganklik nie.
        tos_violation: Indien jou werk versteek is as gevolg van 'n oortreding van die AO3 se Diensvoorwaardes (%{tos_url}), sal jy stappe moet neem om die oortreding reg te stel. Indien jy nie jou werk opdateer om aan die Diensvoorwaardes te voldoen nie, kan jou werk van die AO3 verwyder word.
      tos: Diensvoorwaardes
    anonymous_or_unrevealed_notification:
      anonymous_info: Anonieme werke word ingesluit by etiket-lyste, maar nie op jou werke-bladsy nie. Op die werk sal jou gebruikersnaam vervang word met "Anonymous" (Anoniem).
      anonymous_unrevealed_info: Die versameling onderhouers mag later jou werk openbaar maar dit anoniem los. Mense wat tot jou rekening ingeskryf is sal nie in kennis gestel word van hierdie verandering nie. Sodra dit openbaar is, sal jou werk by etiket lyste ingesluit word, maar nie op jou werke-bladsy nie. Op die werk sal jou gebruikersnaam vervang word met "Anonymous" (Anoniem).
      changed_status:
        anonymous:
          html: Die versameling onderhouers van %{collection_link} het die status van jou werk %{work_link} na anoniem verander.
          text: Die versameling onderhouers van "%{collection_title}" (%{collection_url}) het die status van jou werk "%{work_title}" (%{work_url}) na anoniem verander.
        anonymous_unrevealed:
          html: Die versameling onderhouers van %{collection_link} het die status van jou werk %{work_link} verander na anoniem en ongeopenbaar.
          text: Die versameling onderhouers van "%{collection_title}" (%{collection_url}) het die status van jou werk "%{work_title}" (%{work_url}) na anoniem en ongeopenbaar verander.
        unrevealed:
          html: Die versameling onderhouers van %{collection_link} het die status van jou werk %{work_link} na ongeopenbaar verander.
          text: Die versameling onderhouers van "%{collection_title}" (%{collection_url}) het die status van jou werk "%{work_title}" (%{work_url}) na ongeopenbaar verander.
      collection_items_link_text: Approved Collection Items (Goedgekeurde Versameling Items)-bladsy
      do_not_want:
        anonymous:
          html: As jy nie wil hê jou werk moet anoniem wees nie, besoek asseblief jou %{collection_items_link} om dit vanuit die versameling te verwyder.
          text: 'As jy nie wil hê jou werk moet anoniem wees nie, besoek asseblief jou Approved Collection Items (Goedgekeurde Versameling Items)-bladsy om dit vanuit hierdie versameling te verwyder: %{collection_items_url}'
        anonymous_unrevealed:
          html: As jy nie wil hê jou werk moet anoniem en ongeopenbaar wees nie, besoek asseblief jou %{collection_items_link} om dit vanuit hierdie versameling te verwyder.
          text: 'As jy nie wil hê jou werk moet anoniem en ongeopenbaar wees nie, besoek asseblief jou Approved Collection Items (Goedgekeurde Versameling Items)-bladsy om dit vanuit hierdie versameling te verwyder: %{collection_items_url}'
        unrevealed:
          html: As jy nie wil hê jou werk moet ongeopenbaar wees nie, besoek asseblief jou %{collection_items_link} om dit vanuit hierdie versameling te verwyder.
          text: 'As jy nie wil hê jou werk moet ongeopenbaar wees nie, besoek asseblief jou Approved Collection Items (Goedgekeurde Versameling Items)-bladsy om dit vanuit hierdie versameling te verwyder: %{collection_items_url}'
      faq_link_text: Versamelings Algemene Vrae
      more_info:
        html: Vir meer inligting, besoek ons %{faq_link}.
        text: 'Vir meer inligting, besoek ons Versamelings Algemene Vrae: %{faq_url}'
      subject:
        anonymous: "[%{app_name}] Jou werk is anoniem gemaak"
        anonymous_unrevealed: "[%{app_name}] Jou werk is nou anoniem en ongeopenbaar"
        unrevealed: "[%{app_name}] Jou werk is nou ongeopenbaar"
      unrevealed_info: Ongeopenbaarde werke word nie ingesluit in etiket lyste of op jou werke-bladsy nie. Enigiemand wat 'n skakel na die werk volg sal 'n kennisgewing ontvang dat dit tans ongeopenbaar is en hulle sal nie toegang tot die inhoud kan verkry nie.
    archivist_added_to_collection_notification:
      approved_collection_items_page: Approved Collection Items (Goedgekeurde Versamelingsitems)-bladsy
      archivist_notice: Omdat die versameling onderhouers in hul amptelike hoedanigheid as Open Doors (Oop Deure) argivarisse optree, word hulle toegelaat om jou werk by hierdie versameling te voeg, selfs al het jy versameling uitnodigings gedeaktiveer. Argivarisse sal slegs 'n werk by 'n versameling voeg as dit op 'n ingevoerde argief gehuisves is.
      removal_instructions:
        html: As jy jou werk uit hierdie versameling wil verwyder, besoek asseblief jou %{approved_items_link}.
        text: 'As jy jou werk uit hierdie versameling wil verwyder, besoek asseblief jou Approved Collection Items (Goedgekeurde Versamelingsitems): %{approved_items_link}.'
      subject: "[%{app_name}][%{collection_title}] 'n Open Doors (Oop Deure) argivaris het jou werk by 'n versameling gevoeg"
      work_added:
        html: Die versameling onderhouers van %{collection_link} het jou werk %{work_link} by hul versameling gevoeg!
        text: Die versameling onderhouers van "%{collection_title}" (%{collection_url}) het jou werk "%{work_title}" (%{work_url}) by hul versameling gevoeg!
    challenge_assignment_notification:
      any: Enige
      assignment:
        html: Die volgende versoek is aan jou toegeken in die %{link} uitdaging by die AO3!
      description: 'Beskrywing:'
      due: 'Hierdie opdrag moet voltooi wees teen:'
      html:
        footer: Jy ontvang hierdie e-pos omdat jy ingekryf het vir die %{title} uitdaging. Vir meer inligting oor hierdie uitdaging en kontakbesonderhede van die modereerders, besoek asseblief %{footer_link}.
        footer_link: die uitdaging profielbladsy
        look_up: Jy kan die opdrag opsoek by %{link}.
        look_up_link: Jou Assignments (Opdragte)-bladsy
      optional_tags: 'Opsionele etikette:'
      prompt_url: 'Prikkel URL:'
      prompts: 'Prikkels:'
      recipient: 'Ontvanger:'
      recipient_missing: 'Geen: kontak ''n modereerder vir hulp!'

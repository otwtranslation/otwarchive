        text: 'Hai ricevuto questa email perché avevi lavori presenti in un archivio di fanwork che è stato importato da Open Doors (Porte Aperte) (%{open_doors_url}) su Archive of Our Own – AO3 (Archivio Tutto Per Noi): %{app_url}. Poiché questo indirizzo email è connesso a un account sull''archivio importato, i fanwork a esso associati (di cui sotto) sono stati aggiunti automaticamente al tuo account su AO3.'

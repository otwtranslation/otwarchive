        text: Se desideri che Porte Aperte aggiorni il reindirizzamento perché si riferisca a un tuo lavoro preesistente, per favore elimina la copia importata e contatta Porte Aperte (%{open_doors_url}) con il nome del tuo account di AO3, il nome del tuo account sull'archivio importato, il titolo e URL del fanwork a cui vorresti far riferire il reindirizzamento. (Se si tratta di più di un lavoro, puoi elencarli tutti in una singola email).

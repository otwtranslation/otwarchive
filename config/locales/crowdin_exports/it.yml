        text: Puoi leggere gli annunci riguardanti i trasferimenti di archivi più recenti su AO3 News (%{news_url}) e troverai ulteriori informazioni sulla pagine delle FAQ di Porte Aperte (%{open_doors_faq_url}) o sulla pagina dei tutorial (%{open_doors_tutorial_url}). Se non trovi risposta alla tua domanda nelle FAQ, nei tutorial o in questa email, per favore contatta il Supporto di AO3 (%{support_url}).

        contact_support: contatta il Supporto di AO3
        faq_page: pagina delle FAQ
        html: Puoi leggere gli annunci riguardanti i trasferimenti di archivi più recenti su %{ao3_news_link} e troverai ulteriori informazioni sulla %{faq_page_link} di Porte Aperte o sulla %{tutorial_page_link}. Se non trovi risposta alla tua domanda nelle FAQ, nei tutorial o in questa email, per favore %{contact_support_link}.
        text: Puoi leggere gli annunci riguardanti i trasferimenti di archivi più recenti su AO3 News (%{news_url}) e troverai ulteriori informazioni sulla pagine delle FAQ di Porte Aperte (%{open_doors_faq_url}) o sulla pagina dei tutorial (%{open_doors_tutorial_url}). Se non trovi risposta alla tua domanda nelle FAQ, nei tutorial o in questa email, per favore contatta il Supporto di AO3 (%{support_url}).
        tutorial_page: pagina dei tutorial
      other_works:
        contact_open_doors: contatta Porte Aperte
        html: Se nell'archivio importato avevi altri lavori legati a un altro indirizzo email a cui non hai più accesso, per favore %{contact_open_doors_link} fornendo qualsiasi informazione che permetta di verificare la tua identità come autore dei lavori in oggetto.
        text: Se nell'archivio importato avevi altri lavori legati a un altro indirizzo email a cui non hai più accesso, per favore contatta Porte Aperte fornendo qualsiasi informazione che permetta di verificare la tua identità come autore dei lavori in oggetto.

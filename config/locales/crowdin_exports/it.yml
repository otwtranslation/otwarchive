        text: Se hai ulteriori domande, per favore contatta il Supporto di AO3 (%{support_url}).
      redirects:
        html: Per conservare le liste di fanfic consigliate e i preferiti gli URL dell'archivio importato potrebbero reindirizzare alla copia importata dei lavori per un periodo di tempo limitato (controlla il post riguardante il trasferimento del tuo archivio per averne certezza). Se hai già caricato una copia di un lavoro e %{negation} hai usato la funzione "import from URL" (importa da URL), su AO3 saranno presenti due copie dello stesso lavoro.
        negation: NOT
      subject: "[%{app_name}] Lavori caricati"
      update_redirect:
        contact_open_doors: contatta Porte Aperte
        html: Se desideri che Porte Aperte aggiorni il reindirizzamento perché si riferisca a un tuo lavoro preesistente, per favore elimina la copia importata e %{contact_open_doors_link} con il nome del tuo account di AO3, il nome del tuo account sull'archivio importato, il titolo e URL del fanwork a cui vorresti far riferire il reindirizzamento. (Se si tratta di più di un lavoro, puoi elencarli tutti in una singola email).
        text: Se desideri che Porte Aperte aggiorni il reindirizzamento perché si riferisca a un tuo lavoro preesistente, per favore elimina la copia importata e contatta Porte Aperte (%{open_doors_url}) con il nome del tuo account di AO3, il nome del tuo account sull'archivio importato, il titolo e URL del fanwork a cui vorresti far riferire il reindirizzamento. (Se si tratta di più di un lavoro, puoi elencarli tutti in una singola email).

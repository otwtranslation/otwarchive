    claim_notification:
      access:
        contact_support: contatta il Supporto di AO3.
        html: In base all'archivio di provenienza i tuoi lavori potrebbero essere stati importati in modo tale da essere visibili solo agli utenti registrati (per escluderli dalle ricerche via Google). In tal caso i tuoi lavori saranno disponibili soltanto agli utenti che abbiano effettuato l'accesso, a meno che tu non decida di renderli visibili a tutti. Se ti serve aiuto per sbloccare, rendere orfani o eliminare i tuoi lavori, per favore %{contact_support_link}.
        text: In base all'archivio di provenienza i tuoi lavori potrebbero essere stati importati in modo tale da essere visibili solo agli utenti registrati (per escluderli dalle ricerche via Google). In tal caso i tuoi lavori saranno disponibili soltanto agli utenti che abbiano effettuato l'accesso, a meno che tu non decida di renderli visibili a tutti. Se ti serve aiuto a sbloccare, rendere orfani o eliminare i tuoi lavori, per favore contatta il supporto di AO3 (%{support_url}).
      email_tips: Nel caso tu decida di contattarci, ricordati per favore di aggiungere alla tua whitelist gli indirizzi email con dominio @transformativeworks.org e controlla che la nostra risposta non sia finita nella cartella di spam.
      introduction:
        ao3_name: Archive of Our Own – AO3 (Archivio Tutto Per Noi)
        html: Hai ricevuto questa email perché avevi lavori presenti in un archivio di fanwork che è stato importato da %{open_doors_name_link} su %{app_link}. Poiché questo indirizzo email è connesso a un account sull'archivio importato, i fanwork a esso associati (di cui sotto) sono stati aggiunti automaticamente al tuo account su AO3.
        open_doors_name: Open Doors (Porte Aperte)
        text: 'Hai ricevuto questa email perché avevi lavori presenti in un archivio di fanwork che è stato importato da Open Doors (Porte Aperte) (%{open_doors_url}) su Archive of Our Own – AO3 (Archivio Tutto Per Noi): %{app_url}. Poiché questo indirizzo email è connesso a un account sull''archivio importato, i fanwork a esso associati (di cui sotto) sono stati aggiunti automaticamente al tuo account su AO3.'
      mistake:
        contact_open_doors: Contatta Porte Aperte
        html: Se si tratta di un errore e questi non sono i tuoi lavori, per favore non eliminarli! %{contact_open_doors_link} e risolveremo il problema.
        text: Se si tratta di un errore e questi non sono i tuoi lavori, per favore non eliminarli! Contatta Porte Aperte (%{open_doors_url}) e risolveremo il problema.
      more_info:
